*{box-sizing:border-box;margin:0;padding:0}html,body{min-height:100%;background:#0f0f11}body{font-family:Georgia,'Times New Roman',serif;color:#e8e4dc;max-width:430px;margin:0 auto;padding-bottom:110px;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}#install-banner{background:#1a2a3a;border-bottom:1px solid #1e3a5a;padding:12px 16px;display:none;align-items:center;gap:12px;font-size:13px;color:#8ab4d4;line-height:1.4}.ib-icon{font-size:22px}.ib-close{margin-left:auto;background:none;border:none;color:#4a6a8a;font-size:18px;cursor:pointer}header{padding:44px 20px 16px;border-bottom:1px solid #2a2a2e}.header-top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:12px}.subtitle{font-size:11px;letter-spacing:.18em;color:#555;text-transform:uppercase;margin-bottom:4px}h1{font-size:30px;font-weight:normal;color:#f0ece4;line-height:1}.badge-due{background:#c8392b;color:#fff;border-radius:20px;padding:4px 12px;font-size:12px;font-family:monospace;font-weight:bold;display:none}.header-btns{display:flex;gap:7px;flex-wrap:wrap}.icon-btn{background:#1a1a1e;border:1px solid #2a2a30;border-radius:9px;color:#777;cursor:pointer;font-size:12px;padding:6px 11px;font-family:inherit}.section-head{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#555;margin:18px 16px 6px}.section-head.done{border-top:1px solid #28282e;padding-top:18px;margin-top:28px}#task-list{padding:0 16px}.empty-state{text-align:center;color:#444;padding:60px 0;font-size:15px;line-height:1.8}.task-item{display:flex;align-items:center;gap:12px;padding:14px 12px;margin-top:8px;border-radius:14px;background:#17171a;border:1px solid #222226;transition:background .4s,border-color .4s}.task-item.today{background:#1e1410;border-color:#4a2a1a}.task-item.week{background:#1f1a10;border-color:#5a4218}.task-item.done{opacity:.55;background:#121215;border-color:#1d1d22}.task-item.flash{background:#1a3a1a;border-color:#3a6a3a;opacity:1}.check-btn{width:36px;height:36px;border-radius:50%;border:2px solid #3a3a40;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:15px;color:#3a3a40;font-family:inherit}.task-item.today .check-btn{border-color:#c8392b;color:#c8392b}.task-item.week .check-btn{border-color:#d98b2b;color:#d98b2b}.task-item.flash .check-btn,.task-item.done .check-btn{border-color:#5db05d;background:#2d6a2d;color:#7ed87e}.task-emoji{font-size:20px;min-width:22px;text-align:center;flex-shrink:0}.task-info{flex:1;min-width:0}.task-title{font-size:15px;color:#b8b4ac;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.task-item.today .task-title{color:#f0d0c0;font-weight:bold}.task-meta{font-size:11px;color:#505050;margin-top:2px}.task-status{text-align:right;flex-shrink:0;font-size:11px;color:#505050;min-width:58px}.task-item.today .task-status{color:#c8392b;font-weight:bold;text-transform:uppercase}.task-item.week .task-status{color:#d98b2b;font-weight:bold;text-transform:uppercase}.more-btn{background:none;border:none;color:#444;cursor:pointer;font-size:15px;padding:4px 2px;flex-shrink:0}.delete-confirm{display:flex;gap:6px}.del-yes,.del-no{border:none;border-radius:6px;color:#e8e4dc;cursor:pointer;padding:5px 9px;font-size:12px;font-family:inherit}.del-yes{background:#8a2020}.del-no{background:#26262c}#fab{position:fixed;bottom:28px;right:max(20px,calc(50vw - 195px));width:54px;height:54px;border-radius:50%;background:#e8e4dc;color:#0f0f11;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:50}.slide-panel{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#1a1a1e;border-top:1px solid #2e2e36;border-radius:20px 20px 0 0;padding:22px 18px 40px;z-index:100;box-shadow:0 -8px 40px rgba(0,0,0,.6);display:none;max-height:92vh;overflow-y:auto}.slide-panel.visible{display:block}.panel-title{font-size:12px;letter-spacing:.15em;text-transform:uppercase;color:#666;margin-bottom:14px}.row{display:flex;gap:10px;margin-bottom:12px}input[type=text],input[type=date],textarea{background:#0f0f11;border:1px solid #2e2e36;border-radius:10px;color:#e8e4dc;font-size:15px;padding:10px 13px;outline:none;font-family:inherit;width:100%;-webkit-appearance:none;appearance:none}input[type=date]{color-scheme:dark}.emoji-inp{width:78px!important;text-align:center;font-size:20px;padding:10px 8px!important;flex-shrink:0}.mode-tabs{display:flex;margin-bottom:12px;border-radius:10px;overflow:hidden;border:1px solid #2e2e36}.mode-tab{flex:1;padding:9px 0;text-align:center;font-size:13px;cursor:pointer;font-family:inherit;background:#0f0f11;color:#555;border:none}.mode-tab.active{background:#e8e4dc;color:#0f0f11;font-weight:bold}.date-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}.date-row label,.section-label{font-size:11px;color:#555;letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}.day-chips{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}.day-chip{width:40px;height:40px;border-radius:50%;border:1px solid #2e2e36;background:#0f0f11;color:#666;cursor:pointer;font-size:12px;font-family:inherit;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}.day-chip.active{background:#e8e4dc;color:#0f0f11;border-color:#e8e4dc;font-weight:bold}.btn-row{display:flex;gap:10px;margin-top:6px}.btn{border-radius:12px;padding:14px 0;font-size:14px;cursor:pointer;font-family:inherit;border:none}.btn-cancel{background:#26262c;color:#888;flex:1}.btn-save{background:#e8e4dc;color:#0f0f11;flex:2;font-weight:bold}.btn-danger{background:#5a1818;color:#e8a0a0;flex:1}.btn-full{flex:1}.import-tabs{display:flex;margin-bottom:14px;border-radius:10px;overflow:hidden;border:1px solid #2e2e36}.import-tab{flex:1;padding:9px 0;text-align:center;font-size:13px;cursor:pointer;font-family:inherit;background:#0f0f11;color:#555;border:none}.import-tab.active{background:#e8e4dc;color:#0f0f11;font-weight:bold}textarea{resize:vertical;min-height:120px;font-size:12px;font-family:monospace}.full-panel{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:100vh;background:#0f0f11;z-index:150;display:none;flex-direction:column;overflow:hidden}.full-panel.visible{display:flex}.full-header{padding:50px 20px 16px;border-bottom:1px solid #2a2a2e;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}.full-header h2{font-size:20px;font-weight:normal;color:#f0ece4}.close-btn{background:#1e1e24;border:1px solid #2e2e36;border-radius:10px;color:#888;cursor:pointer;font-size:16px;padding:5px 11px;font-family:inherit}.full-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}.full-footer{padding:14px 16px;border-top:1px solid #2a2a2e;display:flex;gap:10px;flex-shrink:0}.history-task{margin-bottom:22px}.history-task-title{font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:#666;margin-bottom:8px;display:flex;align-items:center;gap:8px}.history-entry{display:flex;align-items:center;gap:10px;padding:9px 12px;background:#17171a;border:1px solid #222226;border-radius:10px;margin-bottom:4px}.history-dot{width:8px;height:8px;border-radius:50%;background:#5db05d;flex-shrink:0}.history-date{font-size:13px;color:#b8b4ac;flex:1}.history-time{font-size:11px;color:#444;font-family:monospace}#toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);background:#2a2a2e;border:1px solid #3a3a40;color:#e8e4dc;padding:10px 18px;border-radius:20px;font-size:13px;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:300}#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}#update-toast{position:fixed;left:16px;right:16px;bottom:92px;max-width:398px;margin:auto;background:#1a2a3a;border:1px solid #31506b;color:#d7ebff;border-radius:14px;padding:12px 14px;display:none;align-items:center;gap:12px;z-index:400;font-size:13px}#update-toast button{margin-left:auto;background:#d7ebff;color:#102030;border:none;border-radius:10px;padding:8px 10px;font-family:inherit;font-weight:bold}

<body>
<div id="install-banner"><span class="ib-icon">📲</span><span>Teilen → <strong>Zum Home-Bildschirm</strong> für die App-Ansicht</span><button class="ib-close" id="install-close">✕</button></div>
<header><div class="header-top"><div><div class="subtitle">Aufgaben & Routinen</div><h1>Meine Routinen</h1></div><div class="badge-due" id="due-badge">0 heute</div></div><div class="header-btns"><button class="icon-btn" id="history-btn">📋 Verlauf</button><button class="icon-btn" id="export-btn">⬆ Teilen</button><button class="icon-btn" id="import-btn">⬇ Laden</button></div></header>
<div id="task-list"></div><div id="toast"></div><div id="update-toast"><span>Neue Version verfügbar.</span><button id="reload-btn">Aktualisieren</button></div><button id="fab">+</button>
<div class="slide-panel" id="form-panel"><div class="panel-title" id="form-title">Neue Aufgabe</div><div class="row"><input type="text" id="f-emoji" class="emoji-inp" maxlength="6" placeholder="Symbol"><input type="text" id="f-title" placeholder="Aufgabe..." autocomplete="off" autocorrect="off"></div><div class="mode-tabs"><button class="mode-tab active" data-mode="date">Zieldatum</button><button class="mode-tab" data-mode="weekday">Wöchentlich</button></div><div id="date-section"><div class="date-row"><label for="f-target">Zieldatum</label><input type="date" id="f-target"></div></div><div id="weekday-section" style="display:none"><div class="section-label" style="margin-bottom:8px">Ein Wochentag</div><div class="day-chips" id="weekday-chips"></div></div><div class="btn-row"><button class="btn btn-cancel" id="form-cancel">Abbrechen</button><button class="btn btn-danger" id="form-delete" style="display:none">Löschen</button><button class="btn btn-save" id="form-save">Speichern</button></div></div>
<div class="slide-panel" id="import-panel"><div class="panel-title">Daten laden</div><div class="import-tabs"><button class="import-tab active" data-itab="file">Datei wählen</button><button class="import-tab" data-itab="paste">JSON einfügen</button></div><div id="itab-file"><p style="color:#666;font-size:13px;line-height:1.6;margin-bottom:14px">Wähle eine gespeicherte <code style="color:#8ab4d4">.json</code>-Datei inklusive Verlauf.</p><input type="file" id="import-file" accept=".json" style="display:none"><button class="btn btn-save btn-full" id="pick-file-btn">📁 Datei auswählen…</button></div><div id="itab-paste" style="display:none"><textarea id="paste-area" placeholder='{"version":3,"tasks":[...]}'></textarea><div class="btn-row" style="margin-top:10px"><button class="btn btn-cancel" id="paste-cancel">Abbrechen</button><button class="btn btn-save" id="paste-import-btn">Importieren</button></div></div><div style="margin-top:12px"><button class="btn btn-cancel btn-full" id="import-close" style="width:100%;margin-top:4px">Schliessen</button></div></div>
<div class="full-panel" id="history-panel"><div class="full-header"><h2>📋 Verlauf</h2><button class="close-btn" id="history-close">✕</button></div><div class="full-body" id="history-body"></div><div class="full-footer"><button class="btn btn-cancel btn-full" id="export-csv-btn">CSV</button><button class="btn btn-save btn-full" id="export-json-btn">JSON teilen</button></div></div>
<script>
const KEY='habit_tasks_v3';const WEEK_DAYS=['Mo','Di','Mi','Do','Fr','Sa','So'];let tasks=[],editId=null,deleteTarget=null,formMode='date',formWeekday=null;
function todayStr(){return new Date().toLocaleDateString('sv')}function toDate(s){return s?new Date(s+'T00:00:00'):null}function addDays(s,n){const d=toDate(s||todayStr());d.setDate(d.getDate()+n);return d.toLocaleDateString('sv')}function fmtDate(s){return s?toDate(s).toLocaleDateString('de-CH',{day:'2-digit',month:'short',year:'numeric'}):'Ohne Datum'}function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}function weekEnd(){const d=toDate(todayStr());const day=(d.getDay()+6)%7;d.setDate(d.getDate()+(6-day));return d.toLocaleDateString('sv')}function mondayOf(s){const d=toDate(s);const day=(d.getDay()+6)%7;d.setDate(d.getDate()-day);return d.toLocaleDateString('sv')}function weekdayIndex(s){return (toDate(s).getDay()+6)%7}
function dueDate(t){if(t.ruleType==='weekday'){const today=todayStr(),todayIdx=weekdayIndex(today),target=Number.isInteger(t.weekday)?t.weekday:0;let diff=(target-todayIdx+7)%7;let candidate=addDays(today,diff);const last=t.lastDone||t.completedAt;if(last&&last.slice(0,10)>=candidate){candidate=addDays(candidate,7)}return candidate}return t.targetDate||''}
function isDoneNow(t){if(t.ruleType==='weekday'){const last=(t.lastDone||t.completedAt||'').slice(0,10);return last&&last===todayStr()&&weekdayIndex(todayStr())===t.weekday}return !!t.completed}
function normalizeTask(t){const rt=t.ruleType||'date';return{id:t.id||Date.now()+Math.random(),title:t.title||'',emoji:t.emoji||'',ruleType:rt,targetDate:rt==='date'?(t.targetDate||''):'',weekday:rt==='weekday'?(Number.isInteger(t.weekday)?t.weekday:0):null,completed:rt==='date'?!!t.completed:false,completedAt:t.completedAt||null,lastDone:t.lastDone||null,history:Array.isArray(t.history)?t.history:[]}}
function loadTasks(){try{const data=JSON.parse(localStorage.getItem(KEY)||'[]');tasks=Array.isArray(data)?data.map(normalizeTask):[]}catch{tasks=[]}}function saveTasks(){localStorage.setItem(KEY,JSON.stringify(tasks))}
function status(t){if(isDoneNow(t))return{key:'done',label:'Erledigt',rank:9};const dd=dueDate(t);if(!dd)return{key:'open',label:'Ohne Datum',rank:6};const today=todayStr();if(dd<=today)return{key:'today',label:'Heute fällig',rank:0};if(dd===addDays(today,1))return{key:'tomorrow',label:'Morgen',rank:1};if(dd<=weekEnd())return{key:'week',label:'Diese Woche',rank:2};return{key:'later',label:'Später',rank:3}}
function meta(t){if(t.ruleType==='weekday')return'Jeden '+WEEK_DAYS[t.weekday]+' · nächstes Ziel '+fmtDate(dueDate(t));return fmtDate(t.targetDate)}
function sortedTasks(){return[...tasks].sort((a,b)=>{const sa=status(a),sb=status(b);if(sa.rank!==sb.rank)return sa.rank-sb.rank;if(sa.key==='done'&&sb.key==='done')return String((b.lastDone||b.completedAt)||'').localeCompare(String((a.lastDone||a.completedAt)||''));return String(dueDate(a)||'9999-99-99').localeCompare(String(dueDate(b)||'9999-99-99'))||a.title.localeCompare(b.title)})}
function render(){const list=document.getElementById('task-list'),badge=document.getElementById('due-badge');const sorted=sortedTasks();const open=sorted.filter(t=>!isDoneNow(t)),done=sorted.filter(isDoneNow);const todayCount=open.filter(t=>status(t).key==='today').length;badge.textContent=todayCount+' heute';badge.style.display=todayCount?'block':'none';if(!tasks.length){list.innerHTML='<div class="empty-state">Noch keine Aufgaben.<br>Tippe + um zu beginnen.</div>';return}let html='';if(open.length){html+='<div class="section-head">Anstehend</div>'+open.map(taskHtml).join('')}if(done.length){html+='<div class="section-head done">Erledigt</div>'+done.map(taskHtml).join('')}list.innerHTML=html}
function taskHtml(t){const s=status(t),done=isDoneNow(t);return `<div class="task-item ${s.key}" id="ti-${t.id}"><button class="check-btn" data-id="${t.id}">${done?'✓':'○'}</button><div class="task-emoji">${esc(t.emoji)}</div><div class="task-info"><div class="task-title">${esc(t.title)}</div><div class="task-meta">${meta(t)}${(t.lastDone||t.completedAt)?' · zuletzt '+fmtDate((t.lastDone||t.completedAt).slice(0,10)):''}</div></div><div class="task-status">${s.label}</div>${deleteTarget===t.id?`<div class="delete-confirm"><button class="del-yes" data-del="${t.id}">✕</button><button class="del-no" data-cancel>↩</button></div>`:`<button class="more-btn" data-edit="${t.id}">✏</button>`}</div>`}
document.getElementById('task-list').addEventListener('click',e=>{const cb=e.target.closest('.check-btn'),eb=e.target.closest('[data-edit]'),dy=e.target.closest('.del-yes'),dn=e.target.closest('[data-cancel]');if(cb){const id=+cb.dataset.id,item=document.getElementById('ti-'+id),now=new Date().toISOString();tasks=tasks.map(t=>{if(t.id!==id)return t;if(t.ruleType==='weekday')return{...t,lastDone:now,history:[...(t.history||[]),now]};const newDone=!t.completed;return{...t,completed:newDone,completedAt:newDone?now:null,history:newDone?[...(t.history||[]),now]:t.history}});if(item)item.classList.add('flash');setTimeout(()=>{saveTasks();render()},300)}if(eb)openEdit(+eb.dataset.edit);if(dy){tasks=tasks.filter(t=>t.id!==+dy.dataset.del);deleteTarget=null;saveTasks();render()}if(dn){deleteTarget=null;render()}});
document.getElementById('weekday-chips').innerHTML=WEEK_DAYS.map((d,i)=>`<button class="day-chip" data-wday="${i}">${d}</button>`).join('');document.querySelectorAll('.mode-tab').forEach(b=>b.onclick=()=>setFormMode(b.dataset.mode));document.getElementById('weekday-chips').addEventListener('click',e=>{const c=e.target.closest('.day-chip');if(!c)return;formWeekday=+c.dataset.wday;document.querySelectorAll('.day-chip').forEach(x=>x.classList.toggle('active',+x.dataset.wday===formWeekday))});function setFormMode(m){formMode=m;document.querySelectorAll('.mode-tab').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));document.getElementById('date-section').style.display=m==='date'?'block':'none';document.getElementById('weekday-section').style.display=m==='weekday'?'block':'none'}
function openAdd(){editId=null;formWeekday=null;setFormMode('date');document.getElementById('form-title').textContent='Neue Aufgabe';document.getElementById('f-emoji').value='';document.getElementById('f-title').value='';document.getElementById('f-target').value='';document.querySelectorAll('.day-chip').forEach(c=>c.classList.remove('active'));document.getElementById('form-delete').style.display='none';showPanel('form-panel')}function openEdit(id){const t=tasks.find(x=>x.id===id);if(!t)return;editId=id;document.getElementById('form-title').textContent='Aufgabe bearbeiten';document.getElementById('f-emoji').value=t.emoji||'';document.getElementById('f-title').value=t.title||'';document.getElementById('f-target').value=t.targetDate||'';document.getElementById('form-delete').style.display='flex';formWeekday=t.weekday;setFormMode(t.ruleType==='weekday'?'weekday':'date');document.querySelectorAll('.day-chip').forEach(c=>c.classList.toggle('active',+c.dataset.wday===formWeekday));showPanel('form-panel')}function showPanel(id){document.getElementById(id).classList.add('visible');document.getElementById('fab').style.display='none'}function closePanel(id){document.getElementById(id).classList.remove('visible');document.getElementById('fab').style.display='flex'}function saveForm(){const title=document.getElementById('f-title').value.trim();if(!title)return showToast('⚠ Titel fehlt');let data={title,emoji:document.getElementById('f-emoji').value.trim()};if(formMode==='weekday'){if(formWeekday===null)return showToast('⚠ Wochentag wählen');data={...data,ruleType:'weekday',weekday:formWeekday,targetDate:'',completed:false}}else{data={...data,ruleType:'date',targetDate:document.getElementById('f-target').value,weekday:null}}if(editId!==null){tasks=tasks.map(t=>t.id===editId?normalizeTask({...t,...data}):t);showToast('✓ Gespeichert')}else{tasks.push(normalizeTask({...data,id:Date.now()}));showToast('✓ Hinzugefügt')}saveTasks();render();closePanel('form-panel')}document.getElementById('fab').onclick=openAdd;document.getElementById('form-cancel').onclick=()=>closePanel('form-panel');document.getElementById('form-save').onclick=saveForm;document.getElementById('form-delete').onclick=()=>{tasks=tasks.filter(t=>t.id!==editId);saveTasks();render();closePanel('form-panel');showToast('Gelöscht')};document.getElementById('f-title').addEventListener('keydown',e=>{if(e.key==='Enter')saveForm()});
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function buildJSON(){return JSON.stringify({version:3,exportedAt:new Date().toISOString(),tasks},null,2)}function buildCSV(){const rows=[['Aufgabe','Emoji','Regel','Nächstes Ziel','Status','Erledigt am','Uhrzeit']];tasks.forEach(t=>{const hist=t.history?.length?t.history:(t.completedAt?[t.completedAt]:[]),rule=t.ruleType==='weekday'?'Jeden '+WEEK_DAYS[t.weekday]:'Zieldatum';if(hist.length)hist.forEach(iso=>{const d=new Date(iso);rows.push([t.title,t.emoji,rule,dueDate(t),status(t).label,d.toLocaleDateString('de-CH'),d.toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'})])});else rows.push([t.title,t.emoji,rule,dueDate(t),status(t).label,'',''])});return'\uFEFF'+rows.map(r=>r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\n')}async function shareOrDownload(content,fn,type){try{const file=new File([content],fn,{type});if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){await navigator.share({files:[file],title:fn});return}}catch(e){if(e.name==='AbortError')return}const blob=new Blob([content],{type}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=fn;document.body.appendChild(a);a.click();setTimeout(()=>{a.remove();URL.revokeObjectURL(url)},1000);showToast('✓ Download gestartet')}function exportJSON(){shareOrDownload(buildJSON(),'routinen-'+todayStr()+'.json','application/json')}function exportCSV(){shareOrDownload(buildCSV(),'routinen-'+todayStr()+'.csv','text/csv')}document.getElementById('export-btn').onclick=exportJSON;document.getElementById('export-json-btn').onclick=exportJSON;document.getElementById('export-csv-btn').onclick=exportCSV;
document.getElementById('import-btn').onclick=()=>{document.getElementById('paste-area').value='';showPanel('import-panel');switchImportTab('file')};document.getElementById('import-close').onclick=()=>closePanel('import-panel');document.getElementById('paste-cancel').onclick=()=>closePanel('import-panel');document.querySelectorAll('.import-tab').forEach(b=>b.onclick=()=>switchImportTab(b.dataset.itab));function switchImportTab(tab){document.querySelectorAll('.import-tab').forEach(b=>b.classList.toggle('active',b.dataset.itab===tab));document.getElementById('itab-file').style.display=tab==='file'?'block':'none';document.getElementById('itab-paste').style.display=tab==='paste'?'block':'none'}document.getElementById('pick-file-btn').onclick=()=>document.getElementById('import-file').click();document.getElementById('import-file').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{importJSON(ev.target.result);e.target.value=''};r.readAsText(f)});document.getElementById('paste-import-btn').onclick=()=>importJSON(document.getElementById('paste-area').value.trim());function importJSON(text){try{const data=JSON.parse(text),raw=data.tasks||data;if(!Array.isArray(raw))throw new Error('Kein tasks-Array gefunden');tasks=raw.map(normalizeTask);saveTasks();render();closePanel('import-panel');showToast('✓ '+tasks.length+' Aufgaben geladen')}catch(err){showToast('⚠ Fehler: '+err.message)}}
function renderHistory(){const body=document.getElementById('history-body');if(!tasks.length){body.innerHTML='<div class="empty-state">Keine Aufgaben.</div>';return}body.innerHTML=tasks.map(t=>{const hist=[...(t.history||[])].reverse();const entries=hist.length?hist.map(iso=>{const d=new Date(iso);return `<div class="history-entry"><div class="history-dot"></div><div class="history-date">${d.toLocaleDateString('de-CH',{weekday:'short',day:'2-digit',month:'short',year:'numeric'})}</div><div class="history-time">${d.toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'})}</div></div>`}).join(''):'<div style="color:#444;font-size:13px;padding:8px 0">Noch kein Verlauf</div>';return `<div class="history-task"><div class="history-task-title">${esc(t.emoji)} ${esc(t.title)} <span style="color:#3a3a40;font-size:10px;margin-left:auto">${t.ruleType==='weekday'?'Jeden '+WEEK_DAYS[t.weekday]:fmtDate(t.targetDate)}</span></div>${entries}</div>`}).join('')}document.getElementById('history-btn').onclick=()=>{renderHistory();document.getElementById('history-panel').classList.add('visible')};document.getElementById('history-close').onclick=()=>document.getElementById('history-panel').classList.remove('visible');
function isIOS(){return /iP(hone|ad|od)/.test(navigator.userAgent)}function isStandalone(){return window.navigator.standalone===true||window.matchMedia('(display-mode: standalone)').matches}if(isIOS()&&!isStandalone()&&!localStorage.getItem('banner_dismissed'))document.getElementById('install-banner').style.display='flex';document.getElementById('install-close').onclick=()=>{document.getElementById('install-banner').style.display='none';localStorage.setItem('banner_dismissed','1')};
if('serviceWorker'in navigator){window.addEventListener('load',async()=>{const reg=await navigator.serviceWorker.register('./service-worker.js');reg.addEventListener('updatefound',()=>{const nw=reg.installing;nw&&nw.addEventListener('statechange',()=>{if(nw.state==='installed'&&navigator.serviceWorker.controller)document.getElementById('update-toast').style.display='flex'})});setInterval(()=>reg.update(),60*60*1000)});navigator.serviceWorker.addEventListener('controllerchange',()=>location.reload())}document.getElementById('reload-btn').onclick=()=>{navigator.serviceWorker.getRegistration().then(r=>{if(r&&r.waiting)r.waiting.postMessage({type:'SKIP_WAITING'});else location.reload()})};
loadTasks();render();
</script>
