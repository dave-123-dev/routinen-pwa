<style>
:root{--bg:#0f0f11;--surface:#17171b;--surface2:#1e1e24;--line:#2b2b35;--text:#f3f0ea;--muted:#8b8790;--faint:#5e5a63;--red:#ef4e45;--orange:#f2a23a;--blue:#8bb7ff;--green:#62c96b;--cream:#eee9df}*{box-sizing:border-box;margin:0;padding:0}html,body{min-height:100%;background:var(--bg)}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,system-ui,sans-serif;color:var(--text);max-width:680px;margin:0 auto;padding-bottom:calc(104px + env(safe-area-inset-bottom));-webkit-tap-highlight-color:transparent;overscroll-behavior:none}button,input,textarea{font:inherit}.topbar{padding:clamp(22px,6vw,40px) clamp(18px,5vw,28px) 18px;border-bottom:1px solid var(--line);background:radial-gradient(circle at 80% 0%,rgba(239,78,69,.16),transparent 32%),linear-gradient(180deg,#141418 0%,#0f0f11 100%)}.toprow{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:14px;align-items:start}.eyebrow{font-size:clamp(10px,2.4vw,12px);letter-spacing:.18em;text-transform:uppercase;color:#77727d;font-weight:700;margin-bottom:8px}.title{font-size:clamp(34px,8.8vw,56px);line-height:1.02;letter-spacing:-.055em;font-weight:780;color:var(--text);max-width:10ch;overflow-wrap:normal}.badge-due{display:none;background:linear-gradient(135deg,#f05349,#cc382f);color:white;border-radius:999px;padding:9px 14px;font-weight:850;font-size:clamp(12px,3vw,15px);box-shadow:0 14px 34px rgba(239,78,69,.24);white-space:nowrap;margin-top:8px}.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:18px}.action-btn{min-height:44px;border:1px solid #31313b;border-radius:16px;background:linear-gradient(180deg,#222229,#18181e);color:#ddd8d0;display:flex;align-items:center;justify-content:center;gap:8px;font-weight:730;font-size:clamp(13px,3.2vw,15px);cursor:pointer;box-shadow:0 10px 26px rgba(0,0,0,.20)}.action-btn svg{width:18px;height:18px;stroke:currentColor;stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round}.action-btn:active{transform:scale(.985)}#task-l ight:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.status-col{display:flex;align-items:center;gap:10px;justify-self:end}.status-pill{font-size:clamp(10px,2.5vw,12px);font-weight:850;text-transform:uppercase;letter-spacing:.02em;color:#85808a;white-space:nowrap}.today .status-pill{color:var(--red)}.week .status-pill{color:var(--orange)}.edit-btn{width:34px;height:34px;border:none;border-radius:12px;background:transparent;color:#b99654;cursor:pointer;display:flex;align-items:center;justify-content:center}.edit-btn svg{width:18px;height:18px;stroke:currentColor;stroke-width:2.1;fill:none;stroke-linecap:round;stroke-linejoin:round}.delete-confirm{display:flex;gap:6px}.del-yes,.del-no{border:none;border-radius:10px;color:#e8e4dc;cursor:pointer;padding:7px 10px;font-size:12px}.del-yes{background:#8a2020}.del-no{background:#26262c}#fab{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));right:max(18px,calc(50vw - min(316px,46vw)));width:62px;height:62px;border-radius:50%;border:none;background:var(--cream);color:#101014;font-size:34px;font-weight:350;box-shadow:0 14px 38px rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:50}.panel{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:680px;display:none;background:#19191f;border:1px solid #2b2b35;border-bottom:none;border-radius:28px 28px 0 0;padding:10px 18px calc(28px + env(safe-area-inset-bottom));box-shadow:0 -18px 55px rgba(0,0,0,.62);z-index:100;max-height:92vh;overflow-y:auto}.panel.visible{display:block}.grabber{width:44px;height:5px;border-radius:999px;background:#4a4650;margin:2px auto 18px}.panel-title{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#8a858e;font-weight:850;margin-bottom:14px}.field-row{display:grid;grid-template-columns:94px 1fr;gap:10px;margin-bottom:12px}.field{background:#101013;border:1px solid #33333e;border-radius:15px;color:#ede8df;padding:13px 14px;outline:none;width:100%;min-height:48px}.emoji-inp{text-align:center;font-size:18px}.mode-tabs{display:grid;grid-template-columns:1fr 1fr;border:1px solid #33333e;border-radius:16px;overflow:hidden;margin:14px 0}.mode-tab{padding:13px 8px;background:#101013;color:#88838c;border:none;font-weight:760}.mode-tab.active{background:var(--cream);color:#101014}.date-row{display:grid;grid-template-columns:112px 1fr;gap:10px;align-items:center;margin-bottom:12px}.date-row label,.section-label{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#77727d;font-weight:850}.day-chips{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 14px}.day-chip{width:42px;height:42px;border-radius:50%;border:1px solid #33333e;background:#101013;color:#89848e;font-size:12px;font-weight:760}.day-chip.active{background:var(--cream);color:#101014;border-color:var(--cream)}.btn-row{display:grid;grid-template-columns:1fr 1.7fr;gap:10px;margin-top:14px}.btn{border:none;border-radius:16px;min-height:52px;font-weight:820;cursor:pointer}.btn-cancel{background:#26262c;color:#b8b2bc}.btn-save{background:var(--cream);color:#101014}.btn-danger{background:#5a1818;color:#e8a0a0}.btn-full{width:100%}.import-tabs{display:grid;grid-template-columns:1fr 1fr;border:1px solid #33333e;border-radius:16px;overflow:hidden;margin-bottom:14px}.import-tab{padding:12px;background:#101013;color:#88838c;border:none;font-weight:760}.import-tab.active{background:var(--cream);color:#101014}textarea{min-height:130px;resize:vertical;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px}.full-panel{position:fixed;inset:0;margin:auto;width:100%;max-width:680px;background:#0f0f11;z-index:150;display:none;flex-direction:column}.full-panel.visible{display:flex}.full-header{padding:46px 18px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:12px;align-items:center}.full-header h2{font-size:clamp(20px,5vw,28px);line-height:1.1}.close-btn{background:#1e1e24;border:1px solid #30303a;border-radius:13px;color:#b8b2bc;font-size:18px;padding:7px 12px}.full-body{flex:1;overflow-y:auto;padding:16px}.full-footer{border-top:1px solid var(--line);padding:14px 16px;display:grid;grid-template-columns:1fr 1fr;gap:10px}.history-note{font-size:13px;color:#8a858e;line-height:1.5;margin-bottom:14px}.history-task{margin-bottom:22px}.history-task-title{font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:#77727d;font-weight:850;margin-bottom:10px}.history-entry{display:flex;align-items:center;gap:12px;padding:12px;background:#17171b;border:1px solid #272731;border-radius:14px;margin-bottom:7px}.history-dot{width:9px;height:9px;border-radius:50%;background:var(--green);flex:0 0 auto}.history-date{font-size:14px;color:#d8d2c8;flex:1}.history-time{font-size:12px;color:#77727d;font-variant-numeric:tabular-nums}#toast{position:fixed;left:50%;bottom:calc(94px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);background:#2a2a2e;border:1px solid #3a3a40;color:#e8e4dc;padding:10px 18px;border-radius:999px;font-size:13px;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:300}#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}#update-toast{position:fixed;left:16px;right:16px;bottom:92px;max-width:620px;margin:auto;background:#1a2a3a;border:1px solid #31506b;color:#d7ebff;border-radius:16px;padding:12px 14px;display:none;align-items:center;gap:12px;z-index:400;font-size:13px}#update-toast button{margin-left:auto;background:#d7ebff;color:#102030;border:none;border-radius:12px;padding:8px 10px;font-weight:800}@media(max-width:430px){.toprow{grid-template-columns:1fr auto}.title{max-width:8ch}.actions{grid-template-columns:1fr 1fr 1fr}.task-card{grid-template-columns:44px minmax(0,1fr);gap:12px}.status-col{grid-column:2;justify-self:start;margin-top:2px}.check-btn{width:44px;height:44px}.field-row{grid-template-columns:86px 1fr}.date-row{grid-template-columns:1fr}.btn-row{grid-template-columns:1fr 1.4fr}}@media(max-width:350px){.actions{grid-template-columns:1fr}.title{font-size:32px;max-width:100%}.badge-due{margin-top:0}.toprow{grid-template-columns:1fr}.status-pill{white-space:normal}}@media(orientation:landscape) and (max-height:540px){body{max-width:100vw;padding-bottom:78px}.topbar{padding:16px 22px 12px}.toprow{align-items:center}.eyebrow{font-size:9px;margin-bottom:2px}.title{font-size:clamp(28px,5vw,42px);max-width:20ch}.actions{grid-template-columns:repeat(3,auto);justify-content:start;margin-top:10px}.action-btn{min-height:34px;padding:7px 12px}#task-list{display:grid;grid-template-columns:repeat(2,minmax(280px,1fr));gap:0 12px;padding:0 18px}.section-head{grid-column:1/-1;margin-top:14px}.task-card{min-height:68px;padding:12px;border-radius:16px}.task-title{font-size:17px}.task-meta{font-size:11px}.check-btn{width:38px;height:38px}.task-card{grid-template-columns:38px minmax(0,1fr) auto}.task-emoji{font-size:19px}.status-pill{font-size:10px}#fab{width:54px;height:54px;font-size:30px;right:22px;bottom:16px}.panel{max-width:680px;left:50%;right:auto}}

<body>
<header class="topbar"><div class="toprow"><div><div class="eyebrow">Aufgaben & Routinen</div><h1 class="title">Meine Routinen</h1></div><div class="badge-due" id="due-badge">0 heute</div></div><div class="actions"><button class="action-btn" id="history-btn"><svg viewBox="0 0 24 24"><path d="M8 3h8M9 3v3h6V3M6 6h12v15H6z"/></svg>Verlauf</button><button class="action-btn" id="export-btn"><svg viewBox="0 0 24 24"><path d="M12 16V4M7 9l5-5 5 5M5 20h14"/></svg>Teilen</button><button class="action-btn" id="import-btn"><svg viewBox="0 0 24 24"><path d="M12 4v12M7 11l5 5 5-5M5 20h14"/></svg>Import</button></div></header>
<div id="task-list"></div><div id="toast"></div><div id="update-toast"><span>Neue Version verfügbar.</span><button id="reload-btn">Aktualisieren</button></div><button id="fab">+</button>
<div class="panel" id="form-panel"><div class="grabber"></div><div class="panel-title" id="form-title">Neue Aufgabe</div><div class="field-row"><input type="text" id="f-emoji" class="field emoji-inp" maxlength="6" placeholder="Icon"><input type="text" id="f-title" class="field" placeholder="Aufgabenname…" autocomplete="off" autocorrect="off"></div><div class="mode-tabs"><button class="mode-tab active" data-mode="date">Datum</button><button class="mode-tab" data-mode="weekday">Wöchentlich bis</button></div><div id="date-section"><div class="date-row"><label for="f-target">Zieldatum</label><input type="date" id="f-target" class="field"></div></div><div id="weekday-section" style="display:none"><div class="section-label">Bis zu diesem Wochentag erledigen</div><div class="day-chips" id="weekday-chips"></div></div><div class="btn-row"><button class="btn btn-cancel" id="form-cancel">Abbrechen</button><button class="btn btn-save" id="form-save">Speichern</button></div><button class="btn btn-danger btn-full" id="form-delete" style="display:none;margin-top:10px">Löschen</button></div>
<div class="panel" id="import-panel"><div class="grabber"></div><div class="panel-title">Daten importieren</div><div class="import-tabs"><button class="import-tab active" data-itab="file">Datei</button><button class="import-tab" data-itab="paste">JSON</button></div><div id="itab-file"><p style="color:#8a858e;font-size:13px;line-height:1.6;margin-bottom:14px">Wähle eine gespeicherte JSON-Datei inklusive Verlauf.</p><input type="file" id="import-file" accept=".json" style="display:none"><button class="btn btn-save btn-full" id="pick-file-btn">Datei auswählen</button></div><div id="itab-paste" style="display:none"><textarea id="paste-area" class="field" placeholder='{"version":4,"tasks":[...]}'></textarea><div class="btn-row"><button class="btn btn-cancel" id="paste-cancel">Abbrechen</button><button class="btn btn-save" id="paste-import-btn">Importieren</button></div></div><button class="btn btn-cancel btn-full" id="import-close" style="margin-top:12px">Schließen</button></div>
<div class="full-panel" id="history-panel"><div class="full-header"><h2 id="history-title">Verlauf</h2><button class="close-btn" id="history-close">×</button></div><div class="full-body" id="history-body"></div><div class="full-footer"><button class="btn btn-cancel" id="export-csv-btn">CSV</button><button class="btn btn-save" id="export-json-btn">JSON teilen</button></div></div>
<script>
const KEY='habit_tasks_v3';const WEEK_DAYS=['Mo','Di','Mi','Do','Fr','Sa','So'];let tasks=[],editId=null,deleteTarget=null,formMode='date',formWeekday=null;
function todayStr(){return new Date().toLocaleDateString('sv')}function toDate(s){return s?new Date(s+'T00:00:00'):null}function addDays(s,n){const d=toDate(s||todayStr());d.setDate(d.getDate()+n);return d.toLocaleDateString('sv')}function fmtDate(s){return s?toDate(s).toLocaleDateString('de-CH',{weekday:'short',day:'2-digit',month:'short',year:'numeric'}):'Ohne Datum'}function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}function weekEnd(){const d=toDate(todayStr());const day=(d.getDay()+6)%7;d.setDate(d.getDate()+(6-day));return d.toLocaleDateString('sv')}function weekdayIndex(s){return (toDate(s).getDay()+6)%7}function nextWeekdayFrom(base,weekday){const idx=weekdayIndex(base);const diff=(weekday-idx+7)%7;return addDays(base,diff)}function nextWeeklyTargetAfterDone(oldTarget,doneDate,weekday){if(oldTarget&&doneDate<=oldTarget)return addDays(oldTarget,7);let candidate=nextWeekdayFrom(doneDate,weekday);if(candidate<=doneDate)candidate=addDays(candidate,7);return candidate}
function normalizeTask(t){const rt=t.ruleType||'date';const wd=Number.isInteger(t.weekday)?t.weekday:0;let target=t.targetDate||'';if(rt==='weekday'&&!target)target=nextWeekdayFrom(todayStr(),wd);return{id:t.id||Date.now()+Math.random(),title:t.title||'',emoji:t.emoji||'',ruleType:rt,targetDate:rt==='weekday'?target:(target||''),weekday:rt==='weekday'?wd:null,completed:rt==='date'?!!t.completed:false,completedAt:t.completedAt||null,lastDone:t.lastDone||null,history:Array.isArray(t.history)?t.history:[]}}
function loadTasks(){try{const data=JSON.parse(localStorage.getItem(KEY)||'[]');tasks=Array.isArray(data)?data.map(normalizeTask):[]}catch{tasks=[]}}function saveTasks(){localStorage.setItem(KEY,JSON.stringify(tasks))}
function isDoneNow(t){return t.ruleType==='date'&&!!t.completed}function status(t){if(isDoneNow(t))return{key:'done',label:'Erledigt',rank:9};const dd=t.targetDate||'';if(!dd)return{key:'open',label:'Ohne Datum',rank:6};const today=todayStr();if(dd<=today)return{key:'today',label:'Heute fällig',rank:0};if(dd===addDays(today,1))return{key:'tomorrow',label:'Morgen',rank:1};if(dd<=weekEnd())return{key:'week',label:'Diese Woche',rank:2};return{key:'later',label:'Später',rank:3}}
function meta(t){if(t.ruleType==='weekday')return'Wöchentlich bis '+WEEK_DAYS[t.weekday]+' · Ziel '+fmtDate(t.targetDate);return fmtDate(t.targetDate)}
function sortedTasks(){return[...tasks].sort((a,b)=>{const sa=status(a),sb=status(b);if(sa.rank!==sb.rank)return sa.rank-sb.rank;if(sa.key==='done'&&sb.key==='done')return String((b.lastDone||b.completedAt)||'').localeCompare(String((a.lastDone||a.completedAt)||''));return String(a.targetDate||'9999-99-99').localeCompare(String(b.targetDate||'9999-99-99'))||a.title.localeCompare(b.title)})}
function render(){const list=document.getElementById('task-list'),badge=document.getElementById('due-badge');const sorted=sortedTasks();const open=sorted.filter(t=>!isDoneNow(t)),done=sorted.filter(isDoneNow);const todayCount=open.filter(t=>status(t).key==='today').length;badge.textContent=todayCount+' heute';badge.style.display=todayCount?'block':'none';if(!tasks.length){list.innerHTML='<div class="empty-state">Noch keine Aufgaben.<br>Tippe + um zu beginnen.</div>';return}let html='';if(open.length)html+='<div class="section-head">Anstehend</div>'+open.map(taskHtml).join('');if(done.length)html+='<div class="section-head done">Erledigt</div>'+done.map(taskHtml).join('');list.innerHTML=html}
function taskHtml(t){const s=status(t),done=isDoneNow(t);return `<div class="task-card ${s.key}" data-open-history="${t.id}" id="ti-${t.id}"><button class="check-btn" data-id="${t.id}">${done?'✓':'○'}</button><div class="task-main"><div class="task-line">${t.emoji?`<div class="task-emoji">${esc(t.emoji)}</div>`:''}<div class="task-title">${esc(t.title)}</div></div><div class="task-meta">${meta(t)}${(t.lastDone||t.completedAt)?' · zuletzt '+fmtDate((t.lastDone||t.completedAt).slice(0,10)):''}</div></div><div class="status-col"><span class="status-pill">${s.label}</span>${deleteTarget===t.id?`<div class="delete-confirm"><button class="del-yes" data-del="${t.id}">✕</button><button class="del-no" data-cancel>↩</button></div>`:`<button class="edit-btn" data-edit="${t.id}" aria-label="Bearbeiten"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></button>`}</div></div>`}
document.getElementById('task-list').addEventListener('click',e=>{const cb=e.target.closest('.check-btn'),eb=e.target.closest('[data-edit]'),dy=e.target.closest('.del-yes'),dn=e.target.closest('[data-cancel]');if(cb){e.stopPropagation();const id=+cb.dataset.id,item=document.getElementById('ti-'+id),now=new Date().toISOString(),doneDate=now.slice(0,10);tasks=tasks.map(t=>{if(t.id!==id)return t;if(t.ruleType==='weekday'){const nextTarget=nextWeeklyTargetAfterDone(t.targetDate,doneDate,t.weekday);return{...t,lastDone:now,targetDate:nextTarget,history:[...(t.history||[]),now]}}const newDone=!t.completed;return{...t,completed:newDone,completedAt:newDone?now:null,history:newDone?[...(t.history||[]),now]:t.history}});if(item)item.classList.add('flash');setTimeout(()=>{saveTasks();render()},300);return}if(eb){e.stopPropagation();openEdit(+eb.dataset.edit);return}if(dy){e.stopPropagation();tasks=tasks.filter(t=>t.id!==+dy.dataset.del);deleteTarget=null;saveTasks();render();return}if(dn){e.stopPropagation();deleteTarget=null;render();return}const row=e.target.closest('[data-open-history]');if(row)openTaskHistory(+row.dataset.openHistory)});
document.getElementById('weekday-chips').innerHTML=WEEK_DAYS.map((d,i)=>`<button class="day-chip" data-wday="${i}">${d}</button>`).join('');document.querySelectorAll('.mode-tab').forEach(b=>b.onclick=()=>setFormMode(b.dataset.mode));document.getElementById('weekday-chips').addEventListener('click',e=>{const c=e.target.closest('.day-chip');if(!c)return;formWeekday=+c.dataset.wday;document.querySelectorAll('.day-chip').forEach(x=>x.classList.toggle('active',+x.dataset.wday===formWeekday))});function setFormMode(m){formMode=m;document.querySelectorAll('.mode-tab').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));document.getElementById('date-section').style.display=m==='date'?'block':'none';document.getElementById('weekday-section').style.display=m==='weekday'?'block':'none'}
function openAdd(){editId=null;formWeekday=null;setFormMode('date');document.getElementById('form-title').textContent='Neue Aufgabe';document.getElementById('f-emoji').value='';document.getElementById('f-title').value='';document.getElementById('f-target').value='';document.querySelectorAll('.day-chip').forEach(c=>c.classList.remove('active'));document.getElementById('form-delete').style.display='none';showPanel('form-panel')}function openEdit(id){const t=tasks.find(x=>x.id===id);if(!t)return;editId=id;document.getElementById('form-title').textContent='Aufgabe bearbeiten';document.getElementById('f-emoji').value=t.emoji||'';document.getElementById('f-title').value=t.title||'';document.getElementById('f-target').value=t.targetDate||'';document.getElementById('form-delete').style.display='block';formWeekday=t.weekday;setFormMode(t.ruleType==='weekday'?'weekday':'date');document.querySelectorAll('.day-chip').forEach(c=>c.classList.toggle('active',+c.dataset.wday===formWeekday));showPanel('form-panel')}function showPanel(id){document.getElementById(id).classList.add('visible');document.getElementById('fab').style.display='none'}function closePanel(id){document.getElementById(id).classList.remove('visible');document.getElementById('fab').style.display='flex'}function saveForm(){const title=document.getElementById('f-title').value.trim();if(!title)return showToast('Titel fehlt');let data={title,emoji:document.getElementById('f-emoji').value.trim()};if(formMode==='weekday'){if(formWeekday===null)return showToast('Wochentag wählen');const existing=editId!==null?tasks.find(t=>t.id===editId):null;let target=existing&&existing.ruleType==='weekday'&&existing.weekday===formWeekday?existing.targetDate:nextWeekdayFrom(todayStr(),formWeekday);data={...data,ruleType:'weekday',weekday:formWeekday,targetDate:target,completed:false}}else{data={...data,ruleType:'date',targetDate:document.getElementById('f-target').value,weekday:null}}if(editId!==null){tasks=tasks.map(t=>t.id===editId?normalizeTask({...t,...data}):t);showToast('Gespeichert')}else{tasks.push(normalizeTask({...data,id:Date.now()}));showToast('Hinzugefügt')}saveTasks();render();closePanel('form-panel')}document.getElementById('fab').onclick=openAdd;document.getElementById('form-cancel').onclick=()=>closePanel('form-panel');document.getElementById('form-save').onclick=saveForm;document.getElementById('form-delete').onclick=()=>{tasks=tasks.filter(t=>t.id!==editId);saveTasks();render();closePanel('form-panel');showToast('Gelöscht')};document.getElementById('f-title').addEventListener('keydown',e=>{if(e.key==='Enter')saveForm()});
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function buildJSON(){return JSON.stringify({version:4,exportedAt:new Date().toISOString(),tasks},null,2)}function buildCSV(){const rows=[['Aufgabe','Icon','Regel','Zieldatum','Status','Erledigt am','Uhrzeit']];tasks.forEach(t=>{const hist=t.history?.length?t.history:(t.completedAt?[t.completedAt]:[]),rule=t.ruleType==='weekday'?'Wöchentlich bis '+WEEK_DAYS[t.weekday]:'Zieldatum';if(hist.length)hist.forEach(iso=>{const d=new Date(iso);rows.push([t.title,t.emoji,rule,t.targetDate,status(t).label,d.toLocaleDateString('de-CH',{weekday:'short',day:'2-digit',month:'short',year:'numeric'}),d.toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'})])});else rows.push([t.title,t.emoji,rule,t.targetDate,status(t).label,'',''])});return'\uFEFF'+rows.map(r=>r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\n')}async function shareOrDownload(content,fn,type){try{const file=new File([content],fn,{type});if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){await navigator.share({files:[file],title:fn});return}}catch(e){if(e.name==='AbortError')return}const blob=new Blob([content],{type}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=fn;document.body.appendChild(a);a.click();setTimeout(()=>{a.remove();URL.revokeObjectURL(url)},1000);showToast('Download gestartet')}function exportJSON(){shareOrDownload(buildJSON(),'routinen-'+todayStr()+'.json','application/json')}function exportCSV(){shareOrDownload(buildCSV(),'routinen-'+todayStr()+'.csv','text/csv')}document.getElementById('export-btn').onclick=exportJSON;document.getElementById('export-json-btn').onclick=exportJSON;document.getElementById('export-csv-btn').onclick=exportCSV;
document.getElementById('import-btn').onclick=()=>{document.getElementById('paste-area').value='';showPanel('import-panel');switchImportTab('file')};document.getElementById('import-close').onclick=()=>closePanel('import-panel');document.getElementById('paste-cancel').onclick=()=>closePanel('import-panel');document.querySelectorAll('.import-tab').forEach(b=>b.onclick=()=>switchImportTab(b.dataset.itab));function switchImportTab(tab){document.querySelectorAll('.import-tab').forEach(b=>b.classList.toggle('active',b.dataset.itab===tab));document.getElementById('itab-file').style.display=tab==='file'?'block':'none';document.getElementById('itab-paste').style.display=tab==='paste'?'block':'none'}document.getElementById('pick-file-btn').onclick=()=>document.getElementById('import-file').click();document.getElementById('import-file').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{importJSON(ev.target.result);e.target.value=''};r.readAsText(f)});document.getElementById('paste-import-btn').onclick=()=>importJSON(document.getElementById('paste-area').value.trim());function importJSON(text){try{const data=JSON.parse(text),raw=data.tasks||data;if(!Array.isArray(raw))throw new Error('Kein tasks-Array gefunden');tasks=raw.map(normalizeTask);saveTasks();render();closePanel('import-panel');showToast(tasks.length+' Aufgaben geladen')}catch(err){showToast('Fehler: '+err.message)}}
function renderHistory(task=null){const body=document.getElementById('history-body'),title=document.getElementById('history-title');const arr=task?[task]:tasks;title.textContent=task?`${task.emoji?task.emoji+' ':''}${task.title}`:'Verlauf';if(!arr.length){body.innerHTML='<div class="empty-state">Keine Aufgaben.</div>';return}body.innerHTML=arr.map(t=>{const hist=[...(t.history||[])].reverse();const note=`<div class="history-note">${meta(t)}${t.lastDone?' · zuletzt '+fmtDate(t.lastDone.slice(0,10)):''}</div>`;const entries=hist.length?hist.map(iso=>{const d=new Date(iso);return `<div class="history-entry"><div class="history-dot"></div><div class="history-date">${d.toLocaleDateString('de-CH',{weekday:'long',day:'2-digit',month:'short',year:'numeric'})}</div><div class="history-time">${d.toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'})}</div></div>`}).join(''):'<div style="color:#5f5a63;font-size:14px;padding:10px 0">Noch kein Verlauf</div>';return `<div class="history-task">${task?'':`<div class="history-task-title">${esc(t.emoji)} ${esc(t.title)}</div>`}${note}${entries}</div>`}).join('')}function openTaskHistory(id){const t=tasks.find(x=>x.id===id);if(!t)return;renderHistory(t);document.getElementById('history-panel').classList.add('visible')}document.getElementById('history-btn').onclick=()=>{renderHistory();document.getElementById('history-panel').classList.add('visible')};document.getElementById('history-close').onclick=()=>document.getElementById('history-panel').classList.remove('visible');
if('serviceWorker'in navigator){window.addEventListener('load',async()=>{const reg=await navigator.serviceWorker.register('./service-worker.js');reg.addEventListener('updatefound',()=>{const nw=reg.installing;nw&&nw.addEventListener('statechange',()=>{if(nw.state==='installed'&&navigator.serviceWorker.controller)document.getElementById('update-toast').style.display='flex'})});setInterval(()=>reg.update(),60*60*1000)});navigator.serviceWorker.addEventListener('controllerchange',()=>location.reload())}document.getElementById('reload-btn').onclick=()=>{navigator.serviceWorker.getRegistration().then(r=>{if(r&&r.waiting)r.waiting.postMessage({type:'SKIP_WAITING'});else location.reload()})};
loadTasks();render();
