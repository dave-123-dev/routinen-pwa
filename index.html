<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#f5f2ed" media="(prefers-color-scheme:light)">
  <meta name="theme-color" content="#0f131b" media="(prefers-color-scheme:dark)">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icons/icon.svg">
  <link rel="stylesheet" href="./styles/app.css">
  <link rel="stylesheet" href="./styles/task-buttons.css">
  <link rel="stylesheet" href="./styles/modular.css">
  <title>Meine Routinen</title>
</head>
<body>
  <header class="top">
    <div class="toprow">
      <div class="brand">
        <div id="eyebrow" class="eyebrow">Aufgaben & Routinen</div>
        <h1 id="mainTitle" class="title">Meine Routinen</h1>
      </div>
      <div class="headright">
        <div id="badge" class="badge">0 heute</div>
        <div class="utilities" aria-label="Aktionen">
          <button id="exportBtn" class="iconAction" aria-label="Teilen">&#8682;</button>
          <button id="importBtn" class="iconAction" aria-label="Import">&#10515;</button>
          <button id="settingsBtn" class="gear" aria-label="Einstellungen">&#9881;</button>
        </div>
      </div>
    </div>
  </header>

  <main id="list" class="list"></main>
  <button id="fab" aria-label="Neue Aufgabe">+</button>
  <div id="toast" class="toast"></div>
  <div id="version" class="version">v35</div>

  <section id="form" class="panel">
    <div class="grab"></div>
    <div id="formTitle" class="pt">Neue Aufgabe</div>

    <div class="row titleRowForm">
      <input id="emoji" placeholder="Emoji" maxlength="6" style="text-align:center">
      <input id="title" placeholder="Aufgabenname...">
    </div>

    <label id="detailsLabel">Details</label>
    <textarea id="details" rows="3" placeholder="Details..."></textarea>

    <div class="tabs">
      <button id="dateTab" class="tab on" type="button" data-mode="date">Datum</button>
      <button id="weekTab" class="tab" type="button" data-mode="weekdays">Wochentage</button>
      <button id="intervalTab" class="tab" type="button" data-mode="interval">Intervall</button>
    </div>

    <div id="datePart" class="formSection">
      <div class="formGrid two">
        <div>
          <label id="targetLabel">Enddatum</label>
          <input id="target" type="date">
        </div>
        <div>
          <label id="endTimeLabel">Endzeit</label>
          <input id="targetTime" type="time">
        </div>
      </div>
    </div>

    <div id="weekdaysPart" class="formSection" style="display:none">
      <label id="weekdaysLabel">An diesen Tagen erledigen</label>
      <div id="days" class="days"></div>
      <div class="formGrid two">
        <div>
          <label id="weekTargetTimeLabel">Endzeit</label>
          <input id="weekTargetTime" type="time">
        </div>
        <label class="checkboxRow">
          <input id="allowMulti" type="checkbox">
          <span id="allowMultiLabel">Mehrfachausführung am selben Tag erlauben</span>
        </label>
      </div>
    </div>

    <div id="intervalPart" class="formSection" style="display:none">
      <div class="formGrid two">
        <div>
          <label id="intervalEveryLabel">Alle</label>
          <input id="intervalAmount" type="number" min="1" value="1">
        </div>
        <div>
          <label id="intervalUnitLabel">Einheit</label>
          <select id="intervalUnit">
            <option id="unitMinutes" value="minutes">Minuten</option>
            <option id="unitHours" value="hours">Stunden</option>
          </select>
        </div>
        <div>
          <label id="startDateLabel">Startdatum</label>
          <input id="intervalStartDate" type="date">
        </div>
        <div>
          <label id="startTimeLabel">Startzeit</label>
          <input id="intervalStartTime" type="time">
        </div>
      </div>
      <div>
        <label id="intervalAnchorLabel">Intervall</label>
        <select id="intervalAnchorMode">
          <option id="anchorStart" value="start">ab Startzeit</option>
          <option id="anchorLastDone" value="lastDone">ab letzter Ausführung</option>
        </select>
      </div>
    </div>

    <div class="formSection optionalSection">
      <label id="reminderLabel">Optionale Erinnerung</label>
      <select id="reminderMode">
        <option id="reminderNone" value="">Keine Erinnerung</option>
        <option id="reminderAtTime" value="time">Zur Uhrzeit</option>
        <option id="reminderBefore" value="before">Vorher erinnern</option>
      </select>
      <div id="reminderTimeWrap">
        <label id="reminderTimeLabel">Uhrzeit</label>
        <input id="reminderTime" type="time">
      </div>
      <div id="reminderLeadWrap" style="display:none">
        <label id="reminderLeadLabel">Minuten vorher</label>
        <input id="reminderLeadMinutes" type="number" min="1" step="1" inputmode="numeric">
      </div>
    </div>

    <div class="buttons">
      <button id="cancel" class="btn cancel">Abbrechen</button>
      <button id="saveBtn" class="btn save">Speichern</button>
    </div>
    <button id="deleteBtn" class="btn danger" style="display:none">Löschen</button>
  </section>

  <section id="importPanel" class="panel">
    <div class="grab"></div>
    <div id="importTitle" class="pt">Import</div>
    <div class="filebox">
      <p id="fileHelp">JSON-Datei aus Dateien/iCloud auswählen</p>
      <input id="importFile" type="file" accept="application/json,.json" style="display:none">
      <button id="pickFile" class="btn save" style="width:100%">Datei auswählen</button>
    </div>
    <label id="pasteLabel">Oder JSON einfügen</label>
    <textarea id="paste" placeholder='{"version":10,"tasks":[...]}'></textarea>
    <div class="buttons">
      <button id="importCancel" class="btn cancel">Abbrechen</button>
      <button id="importPaste" class="btn save">Importieren</button>
    </div>
  </section>

  <section id="settingsPanel" class="panel">
    <div class="grab"></div>
    <div id="settingsTitle" class="pt">Einstellungen</div>
    <div class="formGrid two">
      <div>
        <label id="languageLabel">Sprache</label>
        <select id="language">
          <option value="de">Deutsch</option>
          <option value="en">English</option>
        </select>
      </div>
      <div>
        <label id="viewModeLabel">Taskansicht</label>
        <select id="defaultView">
          <option id="viewDetailed" value="detailed">Detailliert</option>
          <option id="viewCompact" value="compact">Kompakt</option>
        </select>
      </div>
    </div>
    <div class="buttons">
      <button id="settingsCancel" class="btn cancel">Schließen</button>
      <button id="settingsSave" class="btn save">Speichern</button>
    </div>
  </section>

  <section id="history" class="full">
    <div class="fh">
      <h2 id="histTitle">Verlauf</h2>
      <button id="histClose" class="btn cancel historyClose">&times;</button>
    </div>
    <div id="histBody" class="fb"></div>
  </section>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
