<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#f5f2ed" media="(prefers-color-scheme:light)">
  <meta name="theme-color" content="#0f131b" media="(prefers-color-scheme:dark)">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icons/icon.svg">
  <link rel="stylesheet" href="./styles/app.css?v=29">
  <link rel="stylesheet" href="./styles/v27-task-buttons.css?v=29">
  <title>Meine Routinen</title>
</head>
<body>
  <header class="top"><div class="toprow"><div><div id="eyebrow" class="eyebrow">Aufgaben & Routinen</div><h1 id="mainTitle" class="title">Meine Routinen</h1></div><div class="headright"><div id="badge" class="badge">0 heute</div><button id="settingsBtn" class="gear" aria-label="Einstellungen">⚙</button></div></div><div class="actions"><button id="historyBtn">Verlauf</button><button id="exportBtn">Teilen</button><button id="importBtn">Import</button></div></header>
  <main id="list" class="list"></main><button id="fab">+</button><div id="toast" class="toast"></div><div id="version" class="version">v29</div>
  <section id="form" class="panel"><div class="grab"></div><div id="formTitle" class="pt">Neue Aufgabe</div><div class="row"><input id="emoji" placeholder="Icon" maxlength="6" style="text-align:center"><input id="title" placeholder="Aufgabenname…"></div><label id="detailsLabel">Details</label><textarea id="details" rows="3" placeholder="Details…"></textarea><div class="tabs"><button id="dateTab" class="tab on" type="button" data-mode="date">Datum</button><button id="weekTab" class="tab" type="button" data-mode="weekdays">Wochentage</button><button id="intervalTab" class="tab" type="button" data-mode="interval">Intervall</button></div><div id="datePart"><label id="targetLabel">Enddatum</label><input id="target" type="date"><label id="endTimeLabel">Endzeit</label><input id="targetTime" type="time"></div><div id="weekdaysPart" style="display:none"><label id="weekdaysLabel">An diesen Tagen erledigen</label><div id="days" class="days"></div><label style="display:flex;gap:10px;align-items:center;text-transform:none;letter-spacing:0;font-size:14px"><input id="allowMulti" type="checkbox" style="width:auto;min-height:auto"><span id="allowMultiLabel">Mehrfachausführung am selben Tag erlauben</span></label></div><div id="intervalPart" style="display:none"><label id="intervalEveryLabel">Alle</label><input id="intervalAmount" type="number" min="1" value="1"><label id="intervalUnitLabel">Einheit</label><select id="intervalUnit"><option id="unitMinutes" value="minutes">Minuten</option><option id="unitHours" value="hours">Stunden</option></select><label id="startDateLabel">Startdatum</label><input id="intervalStartDate" type="date"><label id="startTimeLabel">Startzeit</label><input id="intervalStartTime" type="time"></div><label id="reminderLabel">Optionale Erinnerung</label><input id="reminder" type="time"><div class="buttons"><button id="cancel" class="btn cancel">Abbrechen</button><button id="saveBtn" class="btn save">Speichern</button></div><button id="deleteBtn" class="btn danger" style="display:none">Löschen</button></section>
  <section id="importPanel" class="panel"><div class="grab"></div><div id="importTitle" class="pt">Import</div><div class="filebox"><p id="fileHelp">JSON-Datei aus Dateien/iCloud auswählen</p><input id="importFile" type="file" accept="application/json,.json" style="display:none"><button id="pickFile" class="btn save" style="width:100%">Datei auswählen</button></div><label id="pasteLabel">Oder JSON einfügen</label><textarea id="paste" placeholder='{"version":9,"tasks":[...]}'></textarea><div class="buttons"><button id="importCancel" class="btn cancel">Abbrechen</button><button id="importPaste" class="btn save">Importieren</button></div></section>
  <section id="settingsPanel" class="panel"><div class="grab"></div><div id="settingsTitle" class="pt">Einstellungen</div><label id="languageLabel">Sprache</label><select id="language"><option value="de">Deutsch</option><option value="en">English</option></select><div class="buttons"><button id="settingsCancel" class="btn cancel">Schließen</button><button id="settingsSave" class="btn save">Speichern</button></div></section>
  <section id="history" class="full"><div class="fh"><h2 id="histTitle">Verlauf</h2><button id="histClose" class="btn cancel" style="padding:0 14px">×</button></div><div id="histBody" class="fb"></div></section>
  <script type="module" src="./src/app-v29.js?v=29"></script>
</body>
</html>
