<style>
:root{--bg:#0f0f11;--panel:#17171a;--panel2:#1c1c21;--line:#292933;--text:#f0ece4;--muted:#77717b;--soft:#bdb7ad;--red:#e34b3f;--orange:#f0a33a;--green:#67c970;--blue:#8ab4ff;--cream:#e8e4dc}*{box-sizing:border-box;margin:0;padding:0}html,body{min-height:100%;background:var(--bg)}body{font-family:Georgia,'Times New Roman',serif;color:var(--text);max-width:clamp(360px,100vw,620px);margin:0 auto;padding-bottom:calc(108px + env(safe-area-inset-bottom));-webkit-tap-highlight-color:transparent;overscroll-behavior:none}#install-banner{background:#1a2a3a;border-bottom:1px solid #1e3a5a;padding:12px 16px;display:none;align-items:center;gap:12px;font-size:13px;color:#8ab4d4;line-height:1.4}.ib-icon{font-size:22px}.ib-close{margin-left:auto;background:none;border:none;color:#4a6a8a;font-size:18px;cursor:pointer}header{padding:clamp(28px,7vw,46px) clamp(16px,5vw,28px) 18px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#121216 0%,#0f0f11 100%)}.header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:16px}.subtitle{font-size:clamp(10px,2.6vw,12px);letter-spacing:.18em;color:#67626b;text-transform:uppercase;margin-bottom:6px;line-height:1.3}h1{font-size:clamp(38px,11vw,60px);font-weight:normal;color:var(--text);line-height:1.04;white-space:normal;overflow-wrap:anywhere;max-width:100%;letter-spacing:-.03em}.badge-due{background:linear-gradient(135deg,#e34b3f,#c8362d);color:#fff;border-radius:999px;padding:8px 14px;font-size:clamp(12px,3vw,15px);font-family:system-ui,-apple-system,sans-serif;font-weight:800;display:none;white-space:nowrap;box-shadow:0 8px 24px rgba(227,75,63,.22);margin-top:10px}.header-btns{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:9px}.icon-btn{background:linear-gradient(180deg,#202027,#17171d);border:1px solid #30303b;border-radius:14px;color:#d8d2c8;cursor:pointer;font-size:clamp(12px,3.1vw,14px);padding:10px 9px;font-family:system-ui,-apple-system,sans-serif;font-weight:650;display:flex;align-items:center;justify-content:center;gap:7px;min-height:42px;box-shadow:0 10px 24px rgba(0,0,0,.18)}.icon-btn:active{transform:scale(.98)}.section-head{font-family:system-ui,-apple-system,sans-serif;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#6d6870;margin:22px clamp(16px,5vw,24px) 8px}.section-head.done{border-top:1px solid var(--line);padding-top:20px;margin-top:30px}#task-list{padding:0 clamp(14px,4.5vw,24px)}.empty-state{text-align:center;color:#514d55;padding:60px 0;font-size:15px;line-height:1.8}.task-item{display:grid;grid-template-columns:42px auto minmax(0,1fr) auto 28px;align-items:center;gap:12px;padding:clamp(13px,3.8vw,18px);margin-top:10px;border-radius:20px;background:linear-gradient(180deg,#19191e,#151519);border:1px solid #262630;transition:background .3s,border-color .3s,transform .15s;cursor:pointer;min-height:82px;box-shadow:0 14px 30px rgba(0,0,0,.18)}.task-item:active{transform:scale(.995)}.task-item.today{background:linear-gradient(135deg,#251711,#1a1311);border-color:#663326}.task-item.week{background:linear-gradient(135deg,#211c11,#17160f);border-color:#594318}.task-item.done{opacity:.58;background:#121215;border-color:#22222b}.task-item.flash{background:#173316;border-color:#37703a;opacity:1}.check-btn{width:42px;height:42px;border-radius:50%;border:3px solid #444451;background:radial-gradient(circle,#19191e 0 35%,transparent 38%);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:15px;color:#555564;font-family:inherit}.task-item.today .check-btn{border-color:var(--red);color:var(--red)}.task-item.week .check-btn{border-color:var(--orange);color:var(--orange)}.task-item.flash .check-btn,.task-item.done .check-btn{border-color:var(--green);background:#214d25;color:#9ceda0}.task-emoji{font-size:clamp(20px,5.5vw,26px);min-width:28px;text-align:center;flex-shrink:0}.task-info{min-width:0}.task-title{font-size:clamp(18px,5.2vw,25px);color:#d8d2c8;line-height:1.16;white-space:normal;overflow:visible;text-overflow:clip;overflow-wrap:anywhere;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}.task-item.today .task-title{color:#f1d8cf;font-weight:bold}.task-meta{font-family:system-ui,-apple-system,sans-serif;font-size:clamp(12px,3.2vw,14px);color:#69656d;margin-top:6px;line-height:1.35;white-space:normal;overflow-wrap:anywhere}.task-status{text-align:right;flex-shrink:0;font-family:system-ui,-apple-system,sans-serif;font-size:clamp(11px,2.8vw,13px);color:#77717b;min-width:72px;line-height:1.15}.task-item.today .task-status{color:var(--red);font-weight:800;text-transform:uppercase}.task-item.week .task-status{color:var(--orange);font-weight:800;text-transform:uppercase}.more-btn{background:none;border:none;color:#c8a15d;cursor:pointer;font-size:18px;padding:4px 2px;flex-shrink:0}.delete-confirm{display:flex;gap:6px}.del-yes,.del-no{border:none;border-radius:8px;color:#e8e4dc;cursor:pointer;padding:6px 9px;font-size:12px;font-family:inherit}.del-yes{background:#8a2020}.del-no{background:#26262c}#fab{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));right:max(18px,calc(50vw - min(290px,45vw)));width:64px;height:64px;border-radius:50%;background:var(--cream);color:#0f0f11;border:none;font-size:36px;cursor:pointer;box-shadow:0 12px 36px rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:50}.slide-panel{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:620px;background:#1a1a1e;border-top:1px solid #2e2e36;border-radius:22px 22px 0 0;padding:22px 18px calc(40px + env(safe-area-inset-bottom));z-index:100;box-shadow:0 -8px 40px rgba(0,0,0,.6);display:none;max-height:92vh;overflow-y:auto}.slide-panel.visible{display:block}.panel-title{font-family:system-ui,-apple-system,sans-serif;font-size:12px;letter-spacing:.15em;text-transform:uppercase;color:#77717b;margin-bottom:14px}.row{display:flex;gap:10px;margin-bottom:12px}input[type=text],input[type=date],textarea{background:#0f0f11;border:1px solid #2e2e36;border-radius:12px;color:#e8e4dc;font-size:16px;padding:12px 13px;outline:none;font-family:inherit;width:100%;-webkit-appearance:none;appearance:none}input[type=date]{color-scheme:dark}.emoji-inp{width:88px!important;text-align:center;font-size:21px;padding:12px 8px!important;flex-shrink:0}.mode-tabs{display:flex;margin-bottom:12px;border-radius:12px;overflow:hidden;border:1px solid #2e2e36}.mode-tab{flex:1;padding:10px 0;text-align:center;font-size:13px;cursor:pointer;font-family:system-ui,-apple-system,sans-serif;background:#0f0f11;color:#6f6a73;border:none}.mode-tab.active{background:#e8e4dc;color:#0f0f11;font-weight:800}.date-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}.date-row label,.section-label{font-family:system-ui,-apple-system,sans-serif;font-size:11px;color:#666;letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}.day-chips{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap}.day-chip{width:42px;height:42px;border-radius:50%;border:1px solid #2e2e36;background:#0f0f11;color:#777;cursor:pointer;font-size:12px;font-family:system-ui,-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}.day-chip.active{background:#e8e4dc;color:#0f0f11;border-color:#e8e4dc;font-weight:800}.btn-row{display:flex;gap:10px;margin-top:6px}.btn{border-radius:14px;padding:14px 0;font-size:14px;cursor:pointer;font-family:system-ui,-apple-system,sans-serif;border:none}.btn-cancel{background:#26262c;color:#aaa;flex:1}.btn-save{background:#e8e4dc;color:#0f0f11;flex:2;font-weight:800}.btn-danger{background:#5a1818;color:#e8a0a0;flex:1}.btn-full{flex:1}.import-tabs{display:flex;margin-bottom:14px;border-radius:12px;overflow:hidden;border:1px solid #2e2e36}.import-tab{flex:1;padding:10px 0;text-align:center;font-size:13px;cursor:pointer;font-family:system-ui,-apple-system,sans-serif;background:#0f0f11;color:#666;border:none}.import-tab.active{background:#e8e4dc;color:#0f0f11;font-weight:800}textarea{resize:vertical;min-height:120px;font-size:12px;font-family:monospace}.full-panel{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:620px;height:100vh;background:#0f0f11;z-index:150;display:none;flex-direction:column;overflow:hidden}.full-panel.visible{display:flex}.full-header{padding:50px 20px 16px;border-bottom:1px solid #2a2a2e;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}.full-header h2{font-size:clamp(20px,6vw,30px);font-weight:normal;color:#f0ece4;line-height:1.1}.close-btn{background:#1e1e24;border:1px solid #2e2e36;border-radius:10px;color:#888;cursor:pointer;font-size:16px;padding:5px 11px;font-family:inherit}.full-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}.full-footer{padding:14px 16px;border-top:1px solid #2a2a2e;display:flex;gap:10px;flex-shrink:0}.history-task{margin-bottom:22px}.history-task-title{font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:#666;margin-bottom:8px;display:flex;align-items:center;gap:8px}.history-entry{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#17171a;border:1px solid #222226;border-radius:12px;margin-bottom:6px}.history-dot{width:8px;height:8px;border-radius:50%;background:#5db05d;flex-shrink:0}.history-date{font-size:14px;color:#b8b4ac;flex:1}.history-time{font-size:11px;color:#555;font-family:monospace}.history-note{font-size:13px;color:#666;margin:0 0 14px;line-height:1.5}#toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);background:#2a2a2e;border:1px solid #3a3a40;color:#e8e4dc;padding:10px 18px;border-radius:20px;font-size:13px;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:300}#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}#update-toast{position:fixed;left:16px;right:16px;bottom:92px;max-width:560px;margin:auto;background:#1a2a3a;border:1px solid #31506b;color:#d7ebff;border-radius:14px;padding:12px 14px;display:none;align-items:center;gap:12px;z-index:400;font-size:13px}#update-toast button{margin-left:auto;background:#d7ebff;color:#102030;border:none;border-radius:10px;padding:8px 10px;font-family:inherit;font-weight:bold}@media(max-width:390px){.header-top{flex-direction:column;align-items:flex-start}.badge-due{margin-top:0}.header-btns{grid-template-columns:1fr}.task-item{grid-template-columns:40px auto minmax(0,1fr) 26px;gap:10px}.task-status{grid-column:3/5;text-align:left;min-width:0;margin-top:4px}.task-title{-webkit-line-clamp:3}.more-btn{grid-column:4}}@media(orientation:landscape) and (max-height:520px){body{max-width:100vw;padding-bottom:78px}header{padding:18px 22px 12px}.header-top{align-items:center}.subtitle{font-size:9px;margin-bottom:2px}h1{font-size:clamp(26px,5vw,42px);line-height:1.05}.header-btns{grid-template-columns:repeat(3,auto);justify-content:flex-start}.icon-btn{min-height:34px;padding:7px 11px}.section-head{margin-top:14px}#task-list{display:grid;grid-template-columns:repeat(2,minmax(260px,1fr));gap:0 12px;padding:0 18px}.section-head{grid-column:1/-1}.task-item{min-height:68px;padding:11px 12px;border-radius:16px}.task-title{font-size:clamp(15px,3vw,20px);-webkit-line-clamp:2}.task-meta{font-size:11px}.task-status{font-size:10px}.check-btn{width:36px;height:36px}#fab{width:54px;height:54px;font-size:30px;bottom:16px;right:22px}}

<body>
<div id="install-banner"><span class="ib-icon">📲</span><span>Teilen → <strong>Zum Home-Bildschirm</strong> für die App-Ansicht</span><button class="ib-close" id="install-close">✕</button></div>
<header><div class="header-top"><div><div class="subtitle">Aufgaben & Routinen</div><h1>Meine Routinen</h1></div><div class="badge-due" id="due-badge">0 heute</div></div><div class="header-btns"><button class="icon-btn" id="history-btn">📋 Verlauf</button><button class="icon-btn" id="export-btn">↗ Teilen</button><button class="icon-btn" id="import-btn">↙ Laden</button></div></header>
<div id="task-list"></div><div id="toast"></div><div id="update-toast"><span>Neue Version verfügbar.</span><button id="reload-btn">Aktualisieren</button></div><button id="fab">+</button>
<div class="slide-panel" id="form-panel"><div class="panel-title" id="form-title">Neue Aufgabe</div><div class="row"><input type="text" id="f-emoji" class="emoji-inp" maxlength="6" placeholder="Symbol"><input type="text" id="f-title" placeholder="Aufgabe..." autocomplete="off" autocorrect="off"></div><div class="mode-tabs"><button class="mode-tab active" data-mode="date">Zieldatum</button><button class="mode-tab" data-mode="weekday">Wöchentlich bis</button></div><div id="date-section"><div class="date-row"><label for="f-target">Zieldatum</label><input type="date" id="f-target"></div></div><div id="weekday-section" style="display:none"><div class="section-label" style="margin-bottom:8px">Bis zu diesem Wochentag erledigen</div><div class="day-chips" id="weekday-chips"></div></div><div class="btn-row"><button class="btn btn-cancel" id="form-cancel">Abbrechen</button><button class="btn btn-danger" id="form-delete" style="display:none">Löschen</button><button class="btn btn-save" id="form-save">Speichern</button></div></div>
<div class="slide-panel" id="import-panel"><div class="panel-title">Daten laden</div><div class="import-tabs"><button class="import-tab active" data-itab="file">Datei wählen</button><button class="import-tab" data-itab="paste">JSON einfügen</button></div><div id="itab-file"><p style="color:#666;font-size:13px;line-height:1.6;margin-bottom:14px">Wähle eine gespeicherte <code style="color:#8ab4d4">.json</code>-Datei inklusive Verlauf.</p><input type="file" id="import-file" accept=".json" style="display:none"><button class="btn btn-save btn-full" id="pick-file-btn">Datei auswählen…</button></div><div id="itab-paste" style="display:none"><textarea id="paste-area" placeholder='{"version":4,"tasks":[...]}'></textarea><div class="btn-row" style="margin-top:10px"><button class="btn btn-cancel" id="paste-cancel">Abbrechen</button><button class="btn btn-save" id="paste-import-btn">Importieren</button></div></div><div style="margin-top:12px"><button class="btn btn-cancel btn-full" id="import-close" style="width:100%;margin-top:4px">Schliessen</button></div></div>
<div class="full-panel" id="history-panel"><div class="full-header"><h2 id="history-title">📋 Verlauf</h2><button class="close-btn" id="history-close">✕</button></div><div class="full-body" id="history-body"></div><div class="full-footer"><button class="btn btn-cancel btn-full" id="export-csv-btn">CSV</button><button class="btn btn-save btn-full" id="export-json-btn">JSON teilen</button></div></div>
<script>
const KEY='habit_tasks_v3';const WEEK_DAYS=['Mo','Di','Mi','Do','Fr','Sa','So'];let tasks=[],editId=null,deleteTarget=null,formMode='date',formWeekday=null;
function todayStr(){return new Date().toLocaleDateString('sv')}function toDate(s){return s?new Date(s+'T00:00:00'):null}function addDays(s,n){const d=toDate(s||todayStr());d.setDate(d.getDate()+n);return d.toLocaleDateString('sv')}function fmtDate(s){return s?toDate(s).toLocaleDateString('de-CH',{weekday:'short',day:'2-digit',month:'short',year:'numeric'}):'Ohne Datum'}function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}function weekEnd(){const d=toDate(todayStr());const day=(d.getDay()+6)%7;d.setDate(d.getDate()+(6-day));return d.toLocaleDateString('sv')}function weekdayIndex(s){return (toDate(s).getDay()+6)%7}function nextWeekdayFrom(base,weekday){const idx=weekdayIndex(base);const diff=(weekday-idx+7)%7;return addDays(base,diff)}function nextWeeklyTargetAfterDone(oldTarget,doneDate,weekday){if(oldTarget&&doneDate<=oldTarget)return addDays(oldTarget,7);let candidate=nextWeekdayFrom(doneDate,weekday);if(candidate<=doneDate)candidate=addDays(candidate,7);return candidate}
function normalizeTask(t){const rt=t.ruleType||'date';const wd=Number.isInteger(t.weekday)?t.weekday:0;let target=t.targetDate||'';if(rt==='weekday'&&!target)target=nextWeekdayFrom(todayStr(),wd);return{id:t.id||Date.now()+Math.random(),title:t.title||'',emoji:t.emoji||'',ruleType:rt,targetDate:rt==='weekday'?target:(target||''),weekday:rt==='weekday'?wd:null,completed:rt==='date'?!!t.completed:false,completedAt:t.completedAt||null,lastDone:t.lastDone||null,history:Array.isArray(t.history)?t.history:[]}}
function loadTasks(){try{const data=JSON.parse(localStorage.getItem(KEY)||'[]');tasks=Array.isArray(data)?data.map(normalizeTask):[]}catch{tasks=[]}}function saveTasks(){localStorage.setItem(KEY,JSON.stringify(tasks))}
function isDoneNow(t){if(t.ruleType==='weekday'){const last=(t.lastDone||'').slice(0,10);return last&&last>=(t.targetDate?addDays(t.targetDate,-6):todayStr())&&last<=t.targetDate}return !!t.completed}function status(t){if(isDoneNow(t))return{key:'done',label:'Erledigt',rank:9};const dd=t.targetDate||'';if(!dd)return{key:'open',label:'Ohne Datum',rank:6};const today=todayStr();if(dd<=today)return{key:'today',label:'Heute fällig',rank:0};if(dd===addDays(today,1))return{key:'tomorrow',label:'Morgen',rank:1};if(dd<=weekEnd())return{key:'week',label:'Diese Woche',rank:2};return{key:'later',label:'Später',rank:3}}
function meta(t){if(t.ruleType==='weekday')return'Wöchentlich bis '+WEEK_DAYS[t.weekday]+' · Ziel '+fmtDate(t.targetDate);return fmtDate(t.targetDate)}
function sortedTasks(){return[...tasks].sort((a,b)=>{const sa=status(a),sb=status(b);if(sa.rank!==sb.rank)return sa.rank-sb.rank;if(sa.key==='done'&&sb.key==='done')return String((b.lastDone||b.completedAt)||'').localeCompare(String((a.lastDone||a.completedAt)||''));return String(a.targetDate||'9999-99-99').localeCompare(String(b.targetDate||'9999-99-99'))||a.title.localeCompare(b.title)})}
function render(){const list=document.getElementById('task-list'),badge=document.getElementById('due-badge');const sorted=sortedTasks();const open=sorted.filter(t=>!isDoneNow(t)),done=sorted.filter(isDoneNow);const todayCount=open.filter(t=>status(t).key==='today').length;badge.textContent=todayCount+' heute';badge.style.display=todayCount?'block':'none';if(!tasks.length){list.innerHTML='<div class="empty-state">Noch keine Aufgaben.<br>Tippe + um zu beginnen.</div>';return}let html='';if(open.length)html+='<div class="section-head">Anstehend</div>'+open.map(taskHtml).join('');if(done.length)html+='<div class="section-head done">Erledigt</div>'+done.map(taskHtml).join('');list.innerHTML=html}
function taskHtml(t){const s=status(t),done=isDoneNow(t);return `<div class="task-item ${s.key}" data-open-history="${t.id}" id="ti-${t.id}"><button class="check-btn" data-id="${t.id}">${done?'✓':'○'}</button><div class="task-emoji">${esc(t.emoji)}</div><div class="task-info"><div class="task-title">${esc(t.title)}</div><div class="task-meta">${meta(t)}${(t.lastDone||t.completedAt)?' · zuletzt '+fmtDate((t.lastDone||t.completedAt).slice(0,10)):''}</div></div><div class="task-status">${s.label}</div>${deleteTarget===t.id?`<div class="delete-confirm"><button class="del-yes" data-del="${t.id}">✕</button><button class="del-no" data-cancel>↩</button></div>`:`<button class="more-btn" data-edit="${t.id}">✎</button>`}</div>`}
document.getElementById('task-list').addEventListener('click',e=>{const cb=e.target.closest('.check-btn'),eb=e.target.closest('[data-edit]'),dy=e.target.closest('.del-yes'),dn=e.target.closest('[data-cancel]');if(cb){e.stopPropagation();const id=+cb.dataset.id,item=document.getElementById('ti-'+id),now=new Date().toISOString(),doneDate=now.slice(0,10);tasks=tasks.map(t=>{if(t.id!==id)return t;if(t.ruleType==='weekday'){const nextTarget=nextWeeklyTargetAfterDone(t.targetDate,doneDate,t.weekday);return{...t,lastDone:now,targetDate:nextTarget,history:[...(t.history||[]),now]}}const newDone=!t.completed;return{...t,completed:newDone,completedAt:newDone?now:null,history:newDone?[...(t.history||[]),now]:t.history}});if(item)item.classList.add('flash');setTimeout(()=>{saveTasks();render()},300);return}if(eb){e.stopPropagation();openEdit(+eb.dataset.edit);return}if(dy){e.stopPropagation();tasks=tasks.filter(t=>t.id!==+dy.dataset.del);deleteTarget=null;saveTasks();render();return}if(dn){e.stopPropagation();deleteTarget=null;render();return}const row=e.target.closest('[data-open-history]');if(row)openTaskHistory(+row.dataset.openHistory)});
document.getElementById('weekday-chips').innerHTML=WEEK_DAYS.map((d,i)=>`<button class="day-chip" data-wday="${i}">${d}</button>`).join('');document.querySelectorAll('.mode-tab').forEach(b=>b.onclick=()=>setFormMode(b.dataset.mode));document.getElementById('weekday-chips').addEventListener('click',e=>{const c=e.target.closest('.day-chip');if(!c)return;formWeekday=+c.dataset.wday;document.querySelectorAll('.day-chip').forEach(x=>x.classList.toggle('active',+x.dataset.wday===formWeekday))});function setFormMode(m){formMode=m;document.querySelectorAll('.mode-tab').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));document.getElementById('date-section').style.display=m==='date'?'block':'none';document.getElementById('weekday-section').style.display=m==='weekday'?'block':'none'}
function openAdd(){editId=null;formWeekday=null;setFormMode('date');document.getElementById('form-title').textContent='Neue Aufgabe';document.getElementById('f-emoji').value='';document.getElementById('f-title').value='';document.getElementById('f-target').value='';document.querySelectorAll('.day-chip').forEach(c=>c.classList.remove('active'));document.getElementById('form-delete').style.display='none';showPanel('form-panel')}function openEdit(id){const t=tasks.find(x=>x.id===id);if(!t)return;editId=id;document.getElementById('form-title').textContent='Aufgabe bearbeiten';document.getElementById('f-emoji').value=t.emoji||'';document.getElementById('f-title').value=t.title||'';document.getElementById('f-target').value=t.targetDate||'';document.getElementById('form-delete').style.display='flex';formWeekday=t.weekday;setFormMode(t.ruleType==='weekday'?'weekday':'date');document.querySelectorAll('.day-chip').forEach(c=>c.classList.toggle('active',+c.dataset.wday===formWeekday));showPanel('form-panel')}function showPanel(id){document.getElementById(id).classList.add('visible');document.getElementById('fab').style.display='none'}function closePanel(id){document.getElementById(id).classList.remove('visible');document.getElementById('fab').style.display='flex'}function saveForm(){const title=document.getElementById('f-title').value.trim();if(!title)return showToast('⚠ Titel fehlt');let data={title,emoji:document.getElementById('f-emoji').value.trim()};if(formMode==='weekday'){if(formWeekday===null)return showToast('⚠ Wochentag wählen');const existing=editId!==null?tasks.find(t=>t.id===editId):null;let target=existing&&existing.ruleType==='weekday'&&existing.weekday===formWeekday?existing.targetDate:nextWeekdayFrom(todayStr(),formWeekday);data={...data,ruleType:'weekday',weekday:formWeekday,targetDate:target,completed:false}}else{data={...data,ruleType:'date',targetDate:document.getElementById('f-target').value,weekday:null}}if(editId!==null){tasks=tasks.map(t=>t.id===editId?normalizeTask({...t,...data}):t);showToast('✓ Gespeichert')}else{tasks.push(normalizeTask({...data,id:Date.now()}));showToast('✓ Hinzugefügt')}saveTasks();render();closePanel('form-panel')}document.getElementById('fab').onclick=openAdd;document.getElementById('form-cancel').onclick=()=>closePanel('form-panel');document.getElementById('form-save').onclick=saveForm;document.getElementById('form-delete').onclick=()=>{tasks=tasks.filter(t=>t.id!==editId);saveTasks();render();closePanel('form-panel');showToast('Gelöscht')};document.getElementById('f-title').addEventListener('keydown',e=>{if(e.key==='Enter')saveForm()});
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function buildJSON(){return JSON.stringify({version:4,exportedAt:new Date().toISOString(),tasks},null,2)}function buildCSV(){const rows=[['Aufgabe','Emoji','Regel','Zieldatum','Status','Erledigt am','Uhrzeit']];tasks.forEach(t=>{const hist=t.history?.length?t.history:(t.completedAt?[t.completedAt]:[]),rule=t.ruleType==='weekday'?'Wöchentlich bis '+WEEK_DAYS[t.weekday]:'Zieldatum';if(hist.length)hist.forEach(iso=>{const d=new Date(iso);rows.push([t.title,t.emoji,rule,t.targetDate,status(t).label,d.toLocaleDateString('de-CH',{weekday:'short',day:'2-digit',month:'short',year:'numeric'}),d.toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'})])});else rows.push([t.title,t.emoji,rule,t.targetDate,status(t).label,'',''])});return'\uFEFF'+rows.map(r=>r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\n')}async function shareOrDownload(content,fn,type){try{const file=new File([content],fn,{type});if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){await navigator.share({files:[file],title:fn});return}}catch(e){if(e.name==='AbortError')return}const blob=new Blob([content],{type}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=fn;document.body.appendChild(a);a.click();setTimeout(()=>{a.remove();URL.revokeObjectURL(url)},1000);showToast('✓ Download gestartet')}function exportJSON(){shareOrDownload(buildJSON(),'routinen-'+todayStr()+'.json','application/json')}function exportCSV(){shareOrDownload(buildCSV(),'routinen-'+todayStr()+'.csv','text/csv')}document.getElementById('export-btn').onclick=exportJSON;document.getElementById('export-json-btn').onclick=exportJSON;document.getElementById('export-csv-btn').onclick=exportCSV;
document.getElementById('import-btn').onclick=()=>{document.getElementById('paste-area').value='';showPanel('import-panel');switchImportTab('file')};document.getElementById('import-close').onclick=()=>closePanel('import-panel');document.getElementById('paste-cancel').onclick=()=>closePanel('import-panel');document.querySelectorAll('.import-tab').forEach(b=>b.onclick=()=>switchImportTab(b.dataset.itab));function switchImportTab(tab){document.querySelectorAll('.import-tab').forEach(b=>b.classList.toggle('active',b.dataset.itab===tab));document.getElementById('itab-file').style.display=tab==='file'?'block':'none';document.getElementById('itab-paste').style.display=tab==='paste'?'block':'none'}document.getElementById('pick-file-btn').onclick=()=>document.getElementById('import-file').click();document.getElementById('import-file').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{importJSON(ev.target.result);e.target.value=''};r.readAsText(f)});document.getElementById('paste-import-btn').onclick=()=>importJSON(document.getElementById('paste-area').value.trim());function importJSON(text){try{const data=JSON.parse(text),raw=data.tasks||data;if(!Array.isArray(raw))throw new Error('Kein tasks-Array gefunden');tasks=raw.map(normalizeTask);saveTasks();render();closePanel('import-panel');showToast('✓ '+tasks.length+' Aufgaben geladen')}catch(err){showToast('⚠ Fehler: '+err.message)}}
function renderHistory(task=null){const body=document.getElementById('history-body'),title=document.getElementById('history-title');const arr=task?[task]:tasks;title.textContent=task?`${task.emoji?task.emoji+' ':''}${task.title}`:'📋 Verlauf';if(!arr.length){body.innerHTML='<div class="empty-state">Keine Aufgaben.</div>';return}body.innerHTML=arr.map(t=>{const hist=[...(t.history||[])].reverse();const note=`<div class="history-note">${meta(t)}${t.lastDone?' · zuletzt '+fmtDate(t.lastDone.slice(0,10)):''}</div>`;const entries=hist.length?hist.map(iso=>{const d=new Date(iso);return `<div class="history-entry"><div class="history-dot"></div><div class="history-date">${d.toLocaleDateString('de-CH',{weekday:'long',day:'2-digit',month:'short',year:'numeric'})}</div><div class="history-time">${d.toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'})}</div></div>`}).join(''):'<div style="color:#444;font-size:13px;padding:8px 0">Noch kein Verlauf</div>';return `<div class="history-task">${task?'':`<div class="history-task-title">${esc(t.emoji)} ${esc(t.title)}</div>`}${note}${entries}</div>`}).join('')}function openTaskHistory(id){const t=tasks.find(x=>x.id===id);if(!t)return;renderHistory(t);document.getElementById('history-panel').classList.add('visible')}document.getElementById('history-btn').onclick=()=>{renderHistory();document.getElementById('history-panel').classList.add('visible')};document.getElementById('history-close').onclick=()=>document.getElementById('history-panel').classList.remove('visible');
function isIOS(){return /iP(hone|ad|od)/.test(navigator.userAgent)}function isStandalone(){return window.navigator.standalone===true||window.matchMedia('(display-mode: standalone)').matches}if(isIOS()&&!isStandalone()&&!localStorage.getItem('banner_dismissed'))document.getElementById('install-banner').style.display='flex';document.getElementById('install-close').onclick=()=>{document.getElementById('install-banner').style.display='none';localStorage.setItem('banner_dismissed','1')};
if('serviceWorker'in navigator){window.addEventListener('load',async()=>{const reg=await navigator.serviceWorker.register('./service-worker.js');reg.addEventListener('updatefound',()=>{const nw=reg.installing;nw&&nw.addEventListener('statechange',()=>{if(nw.state==='installed'&&navigator.serviceWorker.controller)document.getElementById('update-toast').style.display='flex'})});setInterval(()=>reg.update(),60*60*1000)});navigator.serviceWorker.addEventListener('controllerchange',()=>location.reload())}document.getElementById('reload-btn').onclick=()=>{navigator.serviceWorker.getRegistration().then(r=>{if(r&&r.waiting)r.waiting.postMessage({type:'SKIP_WAITING'});else location.reload()})};
loadTasks();render();
