<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#f7f4ef" media="(prefers-color-scheme:light)">
<meta name="theme-color" content="#101014" media="(prefers-color-scheme:dark)">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icons/icon.svg">
<title>Meine Routinen</title>
<style>
:root{color-scheme:light;--bg:#f7f4ef;--card:#fff;--card2:#eee8df;--text:#191719;--muted:#746d76;--line:#ded6cc;--red:#d93b34;--orange:#c57620;--blue:#386fd4;--green:#2f8f43;--accent:#191719;--shadow:rgba(40,30,20,.12)}@media(prefers-color-scheme:dark){:root{color-scheme:dark;--bg:#101014;--card:#18181d;--card2:#23232a;--text:#f3f0ea;--muted:#8b8790;--line:#30303a;--red:#ef5048;--orange:#f2a23a;--blue:#8bb7ff;--green:#62c96b;--accent:#eee9df;--shadow:rgba(0,0,0,.35)}}*{box-sizing:border-box}body{margin:0 auto;max-width:680px;min-height:100vh;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding-bottom:110px;-webkit-tap-highlight-color:transparent}.top{padding:32px 20px 18px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,var(--card2),var(--bg))}.toprow{display:flex;justify-content:space-between;gap:14px}.eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:850}.title{margin:8px 0 0;font-size:clamp(38px,10vw,58px);line-height:1;letter-spacing:-.055em;max-width:9ch}.badge{display:none;margin-top:8px;background:var(--red);color:#fff;border-radius:99px;padding:9px 14px;font-weight:850;white-space:nowrap}.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:20px}.actions button,.btn{border:0;border-radius:16px;min-height:50px;font-weight:850}.actions button{border:1px solid var(--line);background:linear-gradient(180deg,var(--card),var(--card2));color:var(--text)}.list{padding:0 16px;overflow:hidden}.section{margin:24px 8px 9px;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.16em;font-weight:900}.section.done{border-top:1px solid var(--line);padding-top:22px}.empty{text-align:center;color:var(--muted);padding:60px 0;line-height:1.7}.card{position:relative;display:grid;grid-template-columns:48px 1fr auto;gap:13px;align-items:center;min-height:86px;margin:10px 0;padding:15px;border:1px solid var(--line);border-radius:22px;background:var(--card);box-shadow:0 14px 34px var(--shadow);transition:transform .22s ease}.card.swiped{transform:translateX(-96px)}.delSwipe{position:absolute;right:-88px;top:10px;bottom:10px;width:76px;border:0;border-radius:18px;background:var(--red);color:#fff;font-weight:900}.today{border-color:color-mix(in srgb,var(--red) 55%,var(--line));background:color-mix(in srgb,var(--red) 10%,var(--card))}.week{border-color:color-mix(in srgb,var(--orange) 45%,var(--line));background:color-mix(in srgb,var(--orange) 10%,var(--card))}.nextweek{border-color:color-mix(in srgb,var(--blue) 35%,var(--line));background:color-mix(in srgb,var(--blue) 8%,var(--card))}.done{opacity:.58}.check{width:48px;height:48px;border-radius:50%;border:3px solid var(--muted);background:transparent;color:var(--muted);font-weight:900}.today .check{border-color:var(--red);color:var(--red)}.week .check{border-color:var(--orange);color:var(--orange)}.nextweek .check{border-color:var(--blue);color:var(--blue)}.done .check{border-color:var(--green);color:var(--green)}.name{display:flex;gap:9px;align-items:center;font-size:clamp(18px,4.8vw,23px);font-weight:850;line-height:1.18}.emoji{font-size:22px}.meta{margin-top:6px;color:var(--muted);font-size:13px;line-height:1.35}.side{display:flex;gap:6px;align-items:center}.status{font-size:12px;text-transform:uppercase;font-weight:900;color:var(--muted);white-space:nowrap}.today .status{color:var(--red)}.week .status{color:var(--orange)}.nextweek .status{color:var(--blue)}.edit{border:0;background:transparent;color:#b99654;font-size:22px;padding:8px}#fab{position:fixed;right:max(18px,calc(50vw - min(316px,46vw)));bottom:24px;width:62px;height:62px;border:0;border-radius:50%;background:var(--accent);color:var(--bg);font-size:36px;box-shadow:0 14px 38px var(--shadow)}.panel{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:680px;max-height:92vh;overflow:auto;display:none;background:var(--card);border:1px solid var(--line);border-bottom:0;border-radius:28px 28px 0 0;padding:12px 18px 30px;z-index:20;box-shadow:0 -18px 55px var(--shadow)}.panel.show{display:block}.grab{width:44px;height:5px;border-radius:99px;background:var(--line);margin:0 auto 18px}.pt{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.16em;font-weight:900;margin-bottom:14px}.row{display:grid;grid-template-columns:92px 1fr;gap:10px}input,textarea{width:100%;border:1px solid var(--line);background:var(--bg);color:var(--text);border-radius:15px;min-height:48px;padding:12px 13px;font:inherit}.tabs{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--line);border-radius:16px;overflow:hidden;margin:14px 0}.tab{border:0;background:var(--bg);color:var(--muted);min-height:46px;font-weight:850}.tab.on{background:var(--accent);color:var(--bg)}label{display:block;margin:14px 0 7px;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.12em;font-weight:900}.days{display:flex;gap:8px;flex-wrap:wrap}.day{width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:var(--bg);color:var(--muted);font-weight:900}.day.on{background:var(--accent);color:var(--bg)}.buttons{display:grid;grid-template-columns:1fr 1.6fr;gap:10px;margin-top:16px}.cancel{background:var(--card2);color:var(--muted)}.save{background:var(--accent);color:var(--bg)}.danger{background:var(--red);color:#fff;width:100%;margin-top:10px}.filebox{border:1.5px dashed var(--line);border-radius:18px;background:var(--bg);padding:18px;text-align:center;margin-bottom:14px}.filebox p{margin:0 0 12px;color:var(--muted);font-size:14px}.full{position:fixed;inset:0;background:var(--bg);z-index:30;display:none;flex-direction:column;max-width:680px;margin:auto}.full.show{display:flex}.fh{display:flex;justify-content:space-between;align-items:center;padding:45px 18px 16px;border-bottom:1px solid var(--line)}.fb{padding:16px;overflow:auto;flex:1}.hist{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:12px;border:1px solid var(--line);background:var(--card);border-radius:14px;margin:8px 0}.hist span{min-width:0}.histDel{border:0;border-radius:12px;background:var(--red);color:#fff;font-weight:900;min-width:42px;min-height:36px}.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:var(--card2);border:1px solid var(--line);padding:10px 18px;border-radius:99px;display:none;z-index:50}.toast.show{display:block}@media(max-width:430px){.card{grid-template-columns:44px 1fr}.side{grid-column:2}.row{grid-template-columns:86px 1fr}.title{max-width:8ch}}
</style>
</head>
<body>
<header class="top"><div class="toprow"><div><div class="eyebrow">Aufgaben & Routinen</div><h1 class="title">Meine Routinen</h1></div><div id="badge" class="badge">0 heute</div></div><div class="actions"><button id="historyBtn">Verlauf</button><button id="exportBtn">Teilen</button><button id="importBtn">Import</button></div></header>
<main id="list" class="list"></main><button id="fab">+</button><div id="toast" class="toast"></div>
<section id="form" class="panel"><div class="grab"></div><div id="formTitle" class="pt">Neue Aufgabe</div><div class="row"><input id="emoji" placeholder="Icon" maxlength="6" style="text-align:center"><input id="title" placeholder="Aufgabenname…"></div><div class="tabs"><button class="tab on" type="button" data-mode="date">Datum</button><button class="tab" type="button" data-mode="weekdays">Wochentage</button></div><div id="datePart"><label>Zieldatum</label><input id="target" type="date"></div><div id="weekPart" style="display:none"><label>An diesen Tagen erledigen</label><div id="days" class="days"></div></div><label>Optionale Erinnerung</label><input id="reminder" type="time"><div class="buttons"><button id="cancel" class="btn cancel">Abbrechen</button><button id="save" class="btn save">Speichern</button></div><button id="deleteBtn" class="btn danger" style="display:none">Löschen</button></section>
<section id="importPanel" class="panel"><div class="grab"></div><div class="pt">Import</div><div class="filebox"><p>JSON-Datei aus Dateien/iCloud auswählen</p><input id="importFile" type="file" accept="application/json,.json" style="display:none"><button id="pickFile" class="btn save" style="width:100%">Datei auswählen</button></div><label>Oder JSON einfügen</label><textarea id="paste" placeholder='{"version":5,"tasks":[...]}'></textarea><div class="buttons"><button id="importCancel" class="btn cancel">Abbrechen</button><button id="importPaste" class="btn save">Importieren</button></div></section>
<section id="history" class="full"><div class="fh"><h2 id="histTitle">Verlauf</h2><button id="histClose" class="btn cancel" style="padding:0 14px">×</button></div><div id="histBody" class="fb"></div></section>
<script>
const KEY='habit_tasks_v5';
const OLD='habit_tasks_v3';
const D=['Mo','Di','Mi','Do','Fr','Sa','So'];
let tasks=[],editId=null,mode='date',selDays=[],sx=0,sy=0,row=null,currentHistId=null;
const $=id=>document.getElementById(id);
const today=()=>new Date().toLocaleDateString('sv');
const td=s=>new Date(s+'T00:00:00');
const add=(s,n)=>{let d=td(s||today());d.setDate(d.getDate()+n);return d.toLocaleDateString('sv')};
const wd=s=>(td(s).getDay()+6)%7;
const fmt=s=>s?td(s).toLocaleDateString('de-CH',{weekday:'short',day:'2-digit',month:'short',year:'numeric'}):'Ohne Datum';
const esc=s=>String(s||'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]||c));
function weekEnd(){let d=td(today()),x=(d.getDay()+6)%7;d.setDate(d.getDate()+6-x);return d.toLocaleDateString('sv')}
function nextWeekEnd(){return add(weekEnd(),7)}
function nextFrom(base,days){days=[...days].sort((a,b)=>a-b);let i=wd(base),best=99;days.forEach(x=>{let diff=(x-i+7)%7;if(diff<best)best=diff});return add(base,best===99?0:best)}
function afterDone(old,done,days){if(old&&done<old)return old;return nextFrom(add(done,1),days)}
function norm(t){let rt=t.ruleType||'date';let days=Array.isArray(t.weekdays)?t.weekdays:(Number.isInteger(t.weekday)?[t.weekday]:[]);days=[...new Set(days.map(Number).filter(n=>n>=0&&n<=6))].sort((a,b)=>a-b);let target=t.targetDate||'';if(rt==='weekday'&&!target&&days.length)target=nextFrom(today(),days);return{id:t.id||Date.now()+Math.random(),title:t.title||'',emoji:t.emoji||'',ruleType:rt,targetDate:target,weekdays:rt==='weekday'?days:[],reminderTime:t.reminderTime||'',completed:rt==='date'&&!!t.completed,completedAt:t.completedAt||null,lastDone:t.lastDone||null,history:Array.isArray(t.history)?t.history:[]}}
function load(){try{let raw=localStorage.getItem(KEY)||localStorage.getItem(OLD)||'[]';tasks=JSON.parse(raw).map(norm);saveLS()}catch{tasks=[]}}
function saveLS(){localStorage.setItem(KEY,JSON.stringify(tasks))}
function done(t){return t.ruleType==='date'&&t.completed}
function stat(t){if(done(t))return{key:'done',label:'Erledigt',rank:9};let d=t.targetDate;if(!d)return{key:'open',label:'Ohne Datum',rank:6};if(d<=today())return{key:'today',label:'Heute fällig',rank:0};if(d===add(today(),1))return{key:'tomorrow',label:'Morgen',rank:1};if(d<=weekEnd())return{key:'week',label:'Diese Woche',rank:2};if(d<=nextWeekEnd())return{key:'nextweek',label:'Nächste Woche',rank:3};return{key:'later',label:'Später',rank:4}}
function meta(t){let r=t.reminderTime?' · Erinnerung '+t.reminderTime:'';return t.ruleType==='weekday'?'Wochentage '+t.weekdays.map(i=>D[i]).join(', ')+' · Ziel '+fmt(t.targetDate)+r:fmt(t.targetDate)+r}
function render(){let sorted=[...tasks].sort((a,b)=>stat(a).rank-stat(b).rank||String(a.targetDate||'9999').localeCompare(String(b.targetDate||'9999')));let html='';let groups=[['today','Heute fällig'],['tomorrow','Morgen'],['week','Diese Woche'],['nextweek','Nächste Woche'],['later','Später'],['open','Ohne Datum']];let due=sorted.filter(t=>stat(t).key==='today').length;$('badge').style.display=due?'block':'none';$('badge').textContent=due+' heute';if(!tasks.length){$('list').innerHTML='<div class="empty">Noch keine Aufgaben.<br>Tippe + um zu beginnen.</div>';return}groups.forEach(g=>{let a=sorted.filter(t=>stat(t).key===g[0]);if(a.length)html+='<div class="section">'+g[1]+'</div>'+a.map(card).join('')});let d=sorted.filter(t=>stat(t).key==='done');if(d.length)html+='<div class="section done">Erledigt</div>'+d.map(card).join('');$('list').innerHTML=html}
function card(t){let s=stat(t);return '<div class="card '+s.key+'" data-id="'+t.id+'"><button class="delSwipe" data-del="'+t.id+'">Löschen</button><button class="check" data-check="'+t.id+'">'+(done(t)?'✓':'○')+'</button><div><div class="name">'+(t.emoji?'<span class="emoji">'+esc(t.emoji)+'</span>':'')+'<span>'+esc(t.title)+'</span></div><div class="meta">'+meta(t)+((t.lastDone||t.completedAt)?' · zuletzt '+fmt((t.lastDone||t.completedAt).slice(0,10)):'')+'</div></div><div class="side"><span class="status">'+s.label+'</span><button class="edit" data-edit="'+t.id+'">✎</button></div></div>'}
function del(id){tasks=tasks.filter(t=>t.id!==id);saveLS();render();toast('Gelöscht')}
$('list').addEventListener('touchstart',e=>{row=e.target.closest('.card');if(!row)return;sx=e.touches[0].clientX;sy=e.touches[0].clientY},{passive:true});
$('list').addEventListener('touchend',e=>{if(!row)return;let dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;if(Math.abs(dx)>45&&Math.abs(dx)>Math.abs(dy)*1.4){document.querySelectorAll('.swiped').forEach(x=>x!==row&&x.classList.remove('swiped'));dx<0?row.classList.add('swiped'):row.classList.remove('swiped')}row=null},{passive:true});
$('list').onclick=e=>{let b=e.target.closest('[data-del]');if(b)return del(+b.dataset.del);b=e.target.closest('[data-check]');if(b){let id=+b.dataset.check;let now=new Date().toISOString(),dd=now.slice(0,10);tasks=tasks.map(t=>{if(t.id!==id)return t;if(t.ruleType==='weekday')return{...t,lastDone:now,targetDate:afterDone(t.targetDate,dd,t.weekdays),history:[...t.history,now]};let nd=!t.completed;return{...t,completed:nd,completedAt:nd?now:null,history:nd?[...t.history,now]:t.history}});saveLS();return render()}b=e.target.closest('[data-edit]');if(b)return openEdit(+b.dataset.edit);let r=e.target.closest('.card');if(r){if(r.classList.contains('swiped'))return r.classList.remove('swiped');openHist(+r.dataset.id)}};
$('days').innerHTML=D.map((d,i)=>'<button class="day" type="button" data-day="'+i+'">'+d+'</button>').join('');
$('days').onclick=e=>{let b=e.target.closest('[data-day]');if(!b)return;let i=+b.dataset.day;selDays=selDays.includes(i)?selDays.filter(x=>x!==i):[...selDays,i].sort((a,b)=>a-b);drawDays()};
function drawDays(){document.querySelectorAll('.day').forEach(b=>b.classList.toggle('on',selDays.includes(+b.dataset.day)))}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>setMode(b.dataset.mode));
function setMode(m){mode=m;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.mode===m));$('datePart').style.display=m==='date'?'block':'none';$('weekPart').style.display=m==='weekdays'?'block':'none'}
function show(id){$(id).classList.add('show');$('fab').style.display='none'}
function hide(id){$(id).classList.remove('show');$('fab').style.display='block'}
function openAdd(){editId=null;selDays=[];setMode('date');$('formTitle').textContent='Neue Aufgabe';$('emoji').value='';$('title').value='';$('target').value='';$('reminder').value='';$('deleteBtn').style.display='none';drawDays();show('form')}
function openEdit(id){let t=tasks.find(x=>x.id===id);if(!t)return;editId=id;selDays=[...(t.weekdays||[])];setMode(t.ruleType==='weekday'?'weekdays':'date');$('formTitle').textContent='Aufgabe bearbeiten';$('emoji').value=t.emoji;$('title').value=t.title;$('target').value=t.targetDate;$('reminder').value=t.reminderTime||'';$('deleteBtn').style.display='block';drawDays();show('form')}
function saveTask(){let title=$('title').value.trim();if(!title)return toast('Titel fehlt');let data={title,emoji:$('emoji').value.trim(),reminderTime:$('reminder').value||''};if(mode==='weekdays'){if(!selDays.length)return toast('Wochentag wählen');let old=tasks.find(t=>t.id===editId),same=old&&JSON.stringify(old.weekdays)===JSON.stringify(selDays);data={...data,ruleType:'weekday',weekdays:[...selDays],targetDate:same?old.targetDate:nextFrom(today(),selDays),completed:false}}else data={...data,ruleType:'date',targetDate:$('target').value,weekdays:[]};if(data.reminderTime&&'Notification'in window&&Notification.permission==='default')Notification.requestPermission();if(editId)tasks=tasks.map(t=>t.id===editId?norm({...t,...data}):t);else tasks.push(norm({...data,id:Date.now()}));saveLS();render();hide('form');toast('Gespeichert')}
$('fab').onclick=openAdd;$('cancel').onclick=()=>hide('form');$('save').onclick=saveTask;$('deleteBtn').onclick=()=>{del(editId);hide('form')};
function exportJSON(){let text=JSON.stringify({version:5,exportedAt:new Date().toISOString(),tasks},null,2);let file=new File([text],'routinen-'+today()+'.json',{type:'application/json'});if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]}))return navigator.share({files:[file],title:'Routinen'});let a=document.createElement('a'),u=URL.createObjectURL(file);a.href=u;a.download=file.name;a.click();setTimeout(()=>URL.revokeObjectURL(u),500)}
$('exportBtn').onclick=exportJSON;
function importText(text){let data=JSON.parse(text),raw=data.tasks||data;if(!Array.isArray(raw))throw new Error('Kein tasks-Array gefunden');tasks=raw.map(norm);saveLS();render();hide('importPanel');toast(tasks.length+' Aufgaben geladen')}
$('importBtn').onclick=()=>show('importPanel');$('importCancel').onclick=()=>hide('importPanel');$('importPaste').onclick=()=>{try{importText($('paste').value)}catch(e){toast('Importfehler: '+e.message)}};$('pickFile').onclick=()=>$('importFile').click();$('importFile').onchange=e=>{let f=e.target.files&&e.target.files[0];if(!f)return;let reader=new FileReader();reader.onload=ev=>{try{importText(ev.target.result)}catch(err){toast('Importfehler: '+err.message)}e.target.value=''};reader.onerror=()=>toast('Datei konnte nicht gelesen werden');reader.readAsText(f)};
function histRow(taskId,iso){let d=new Date(iso);return '<div class="hist"><span>'+d.toLocaleDateString('de-CH',{weekday:'long',day:'2-digit',month:'short',year:'numeric'})+' · '+d.toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'})+'</span><button class="histDel" data-hdel="'+taskId+'" data-hiso="'+encodeURIComponent(iso)+'">×</button></div>'}
function openHist(id){let t=tasks.find(x=>x.id===id);if(!t)return;currentHistId=id;$('history').classList.add('show');$('histTitle').textContent=(t.emoji?t.emoji+' ':'')+t.title;let h=[...t.history].reverse();$('histBody').innerHTML='<div class="meta">'+meta(t)+'</div>'+(h.length?h.map(x=>histRow(t.id,x)).join(''):'<div class="empty">Noch kein Verlauf</div>')}
function renderAllHist(){currentHistId=null;$('history').classList.add('show');$('histTitle').textContent='Verlauf';$('histBody').innerHTML=tasks.map(t=>'<h3>'+esc((t.emoji?t.emoji+' ':'')+t.title)+'</h3>'+((t.history||[]).slice().reverse().map(x=>histRow(t.id,x)).join('')||'<div class="meta">Noch kein Verlauf</div>')).join('')}
function deleteHistoryEntry(id,iso){tasks=tasks.map(t=>{if(t.id!==id)return t;let history=(t.history||[]).filter(x=>x!==iso);let last=history.length?[...history].sort().at(-1):null;let patch={...t,history,lastDone:t.ruleType==='weekday'?last:t.lastDone};if(t.ruleType==='date'&&t.completedAt===iso){patch.completed=false;patch.completedAt=null}return patch});saveLS();render();if(currentHistId)openHist(currentHistId);else renderAllHist();toast('Verlauf gelöscht')}
$('histBody').onclick=e=>{let b=e.target.closest('[data-hdel]');if(!b)return;deleteHistoryEntry(+b.dataset.hdel,decodeURIComponent(b.dataset.hiso))};
$('historyBtn').onclick=renderAllHist;$('histClose').onclick=()=>$('history').classList.remove('show');
function toast(m){$('toast').textContent=m;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),2200)}
function reminders(){if(!('Notification'in window)||Notification.permission!=='granted')return;let n=new Date(),hm=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0'),sent=JSON.parse(localStorage.getItem('reminder_sent_v1')||'{}');tasks.forEach(t=>{if(t.reminderTime!==hm||stat(t).rank>2||done(t))return;let k=t.id+'-'+today()+'-'+hm;if(sent[k])return;new Notification('Routinen',{body:t.title,tag:k});sent[k]=1});localStorage.setItem('reminder_sent_v1',JSON.stringify(sent))}
setInterval(reminders,60000);
if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js'));
load();render();
</script>
</body>
</html>
